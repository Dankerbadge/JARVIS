name: improvement-knowledge-bootstrap-route

on:
  workflow_dispatch:
  schedule:
    - cron: "25 13 * * 1-5"

jobs:
  knowledge-route:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Prepare benchmark restore paths
        run: |
          mkdir -p output/ci/operator_cycle output/ci/prior_route_artifact

      - name: Resolve prior successful route run
        id: prior_route_run
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUNS_API="https://api.github.com/repos/${{ github.repository }}/actions/workflows/improvement-knowledge-bootstrap-route.yml/runs?branch=${{ github.ref_name }}&status=completed&per_page=20"
          RUNS_JSON_PATH="$(mktemp)"
          if ! curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "${RUNS_API}" \
            -o "${RUNS_JSON_PATH}"; then
            echo "Unable to resolve prior workflow runs from GitHub API; continuing without prior benchmark restore."
            echo "run_id=none" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          PRIOR_RUN_ID="$(
            jq -r --arg current "${CURRENT_RUN_ID}" '
              first(
                (
                  (.workflow_runs // [])
                  | map(
                      select(
                        ((.id | tostring) != $current)
                        and (((.conclusion // "") | ascii_downcase) == "success")
                      )
                    )
                  | .[]
                  | (.id | tostring)
                )
              ) // "none"
            ' "${RUNS_JSON_PATH}"
          )"
          echo "run_id=${PRIOR_RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Download prior route artifacts
        if: ${{ steps.prior_route_run.outputs.run_id != 'none' }}
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.prior_route_run.outputs.run_id }}
          pattern: knowledge-bootstrap-route
          path: output/ci/prior_route_artifact
          merge-multiple: true

      - name: Restore prior benchmark report artifact
        run: |
          set -euo pipefail
          PRIOR_BENCHMARK_PATH="$(pwd)/output/ci/prior_route_artifact/operator_cycle/benchmark_frustrations_report.json"
          TARGET_BENCHMARK_PATH="$(pwd)/output/ci/operator_cycle/benchmark_frustrations_report.json"
          if [[ -f "${PRIOR_BENCHMARK_PATH}" ]]; then
            cp "${PRIOR_BENCHMARK_PATH}" "${TARGET_BENCHMARK_PATH}"
            echo "Restored prior benchmark report artifact: ${PRIOR_BENCHMARK_PATH}"
          else
            echo "No prior benchmark report artifact found."
          fi

      - name: Restore prior benchmark stale fallback history artifact
        run: |
          set -euo pipefail
          PRIOR_HISTORY_PATH="$(pwd)/output/ci/prior_route_artifact/operator_cycle/benchmark_stale_fallback_history.jsonl"
          TARGET_HISTORY_PATH="$(pwd)/output/ci/operator_cycle/benchmark_stale_fallback_history.jsonl"
          if [[ -f "${PRIOR_HISTORY_PATH}" ]]; then
            cp "${PRIOR_HISTORY_PATH}" "${TARGET_HISTORY_PATH}"
            echo "Restored prior benchmark stale fallback history artifact: ${PRIOR_HISTORY_PATH}"
          else
            echo "No prior benchmark stale fallback history artifact found."
          fi

      - name: Seed baseline hypothesis templates
        run: |
          set -euo pipefail
          python3 -m jarvis.cli improvement seed-hypotheses \
            --template-path ./configs/improvement_hypothesis_templates_knowledge_stack.json \
            --owner operator \
            --lookup-limit 400 \
            --strict \
            --output-path output/ci/operator_cycle/seed_hypotheses_report.json \
            --json-compact > /dev/null

      - name: Run operator cycle + knowledge route
        run: |
          mkdir -p output/ci
          ./scripts/run_improvement_operator_cycle.sh \
            ./configs/improvement_operator_knowledge_stack.json \
            --output-dir output/ci/operator_cycle \
            --seed-enable \
            --seed-domains quant_finance,kalshi_weather,fitness_apps,market_ml \
            --draft-enable \
            --benchmark-enable \
            --verify-matrix-enable \
            --verify-matrix-path ./configs/improvement_operator_knowledge_stack/matrices/controlled_experiment_matrix.json \
            --verify-matrix-alert-enable \
            --knowledge-brief-enable \
            --knowledge-delta-alert-enable \
            --knowledge-route-enable \
            --knowledge-route-output-path output/ci/knowledge_bootstrap_route.json

      - name: Extract initial knowledge route outputs
        id: route_initial
        run: |
          set -euo pipefail

          ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route.json"
          ROUTE_OUTPUT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_initial_outputs.json"

          python3 -m jarvis.cli improvement knowledge-bootstrap-route-outputs \
            --artifact-path "${ROUTE_ARTIFACT_PATH}" \
            --artifact-source initial \
            --output-path "${ROUTE_OUTPUT_PATH}" \
            --emit-github-output \
            --summary-heading "Knowledge Bootstrap Route" \
            --json-compact > /dev/null

      - name: Bootstrap follow-up rerun
        if: ${{ steps.route_initial.outputs.route == 'bootstrap' && steps.route_initial.outputs.next_action_command != 'none' }}
        run: |
          set -euo pipefail

          ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route.json"
          OPERATOR_REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          POST_ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_post_bootstrap.json"
          FOLLOWUP_RERUN_OUTPUT_PATH="$(pwd)/output/ci/knowledge_bootstrap_followup_rerun.json"

          python3 -m jarvis.cli improvement knowledge-bootstrap-followup-rerun \
            --route-artifact-path "${ROUTE_ARTIFACT_PATH}" \
            --operator-report-path "${OPERATOR_REPORT_PATH}" \
            --post-route-artifact-path "${POST_ROUTE_ARTIFACT_PATH}" \
            --output-path "${FOLLOWUP_RERUN_OUTPUT_PATH}" \
            --emit-github-output \
            --summary-heading "Bootstrap Follow-Up" \
            --json-compact > /dev/null

      - name: Extract effective knowledge route outputs
        id: route
        run: |
          set -euo pipefail

          POST_ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_post_bootstrap.json"
          INITIAL_ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route.json"
          if [[ -f "${POST_ROUTE_ARTIFACT_PATH}" ]]; then
            ROUTE_ARTIFACT_PATH="${POST_ROUTE_ARTIFACT_PATH}"
            ROUTE_ARTIFACT_SOURCE="post_bootstrap"
          elif [[ -f "${INITIAL_ROUTE_ARTIFACT_PATH}" ]]; then
            ROUTE_ARTIFACT_PATH="${INITIAL_ROUTE_ARTIFACT_PATH}"
            ROUTE_ARTIFACT_SOURCE="initial"
          else
            ROUTE_ARTIFACT_PATH="${INITIAL_ROUTE_ARTIFACT_PATH}"
            ROUTE_ARTIFACT_SOURCE="missing"
          fi

          ROUTE_OUTPUT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_effective_outputs.json"
          python3 -m jarvis.cli improvement knowledge-bootstrap-route-outputs \
            --artifact-path "${ROUTE_ARTIFACT_PATH}" \
            --artifact-source "${ROUTE_ARTIFACT_SOURCE}" \
            --output-path "${ROUTE_OUTPUT_PATH}" \
            --emit-github-output \
            --summary-heading "Knowledge Bootstrap Route (Effective)" \
            --summary-include-artifact-source \
            --json-compact > /dev/null

      - name: Benchmark stale fallback runtime alert
        id: benchmark_stale
        run: |
          set -euo pipefail

          ROUTE_OUTPUT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_effective_outputs.json"
          ALERT_PATH="$(pwd)/output/ci/operator_cycle/benchmark_stale_fallback_runtime_alert.json"
          HISTORY_PATH="$(pwd)/output/ci/operator_cycle/benchmark_stale_fallback_history.jsonl"
          DB_PATH="$(pwd)/output/ci/operator_cycle/jarvis.db"

          export JARVIS_REPO_PATH="$(pwd)"
          export JARVIS_DB_PATH="${DB_PATH}"
          ./scripts/run_improvement_benchmark_stale_fallback_runtime_alert.sh \
            "${ROUTE_OUTPUT_PATH}" \
            --output-path "${ALERT_PATH}" \
            --history-path "${HISTORY_PATH}" \
            --history-window "${{ steps.route.outputs.benchmark_stale_history_window }}" \
            --repeat-threshold "${{ steps.route.outputs.benchmark_stale_repeat_threshold }}" \
            --rate-ceiling "${{ steps.route.outputs.benchmark_stale_rate_ceiling }}" \
            --consecutive-runs "${{ steps.route.outputs.benchmark_stale_rate_consecutive_runs }}" \
            --emit-github-output \
            --summary-heading "Benchmark Stale Fallback Runtime Alert" \
            --json-compact > /dev/null

      - name: Extract evidence lookup batch outputs
        id: evidence_lookup_batch
        run: |
          set -euo pipefail

          REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          BATCH_OUTPUT_PATH="$(pwd)/output/ci/operator_cycle/evidence_lookup_batch_outputs.json"

          ./scripts/run_improvement_evidence_lookup_batch_outputs.sh \
            "${REPORT_PATH}" \
            --report-source effective_operator_report \
            --output-path "${BATCH_OUTPUT_PATH}" \
            --emit-github-output \
            --summary-heading "Evidence Lookup Batch" \
            --summary-include-report-source \
            --strict \
            --json-compact > /dev/null

      - name: Run evidence lookup batch
        if: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_ready == '1' && steps.evidence_lookup_batch.outputs.evidence_lookup_command != 'none' }}
        env:
          EVIDENCE_LOOKUP_COMMAND: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_command }}
        run: |
          set -euo pipefail
          bash -lc "${EVIDENCE_LOOKUP_COMMAND}"

      - name: Open evidence lookup runtime alert
        if: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_ready == '1' && steps.evidence_lookup_batch.outputs.evidence_lookup_command != 'none' }}
        id: evidence_lookup_runtime_alert
        env:
          EVIDENCE_LOOKUP_REPORT_PATH: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_report_path }}
          EVIDENCE_LOOKUP_COMMAND: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_command }}
        run: |
          set -euo pipefail

          REPORT_PATH="${EVIDENCE_LOOKUP_REPORT_PATH:-$(pwd)/output/ci/operator_cycle/evidence_lookup_report.json}"
          ALERT_PATH="$(pwd)/output/ci/operator_cycle/evidence_lookup_runtime_alert.json"
          DB_PATH="$(pwd)/output/ci/operator_cycle/jarvis.db"

          export JARVIS_REPO_PATH="$(pwd)"
          export JARVIS_DB_PATH="${DB_PATH}"
          ./scripts/run_improvement_evidence_lookup_runtime_alert.sh \
            "${REPORT_PATH}" \
            --output-path "${ALERT_PATH}" \
            --rerun-command "${EVIDENCE_LOOKUP_COMMAND}" \
            --emit-github-output \
            --summary-heading "Evidence Lookup Runtime Alert" \
            --json-compact > /dev/null

      - name: Fail on unresolved evidence lookup IDs
        if: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_ready == '1' && steps.evidence_lookup_runtime_alert.outputs.evidence_lookup_missing_count != '0' }}
        run: |
          echo "Evidence lookup left unresolved IDs (count=${{ steps.evidence_lookup_runtime_alert.outputs.evidence_lookup_missing_count }}, first=${{ steps.evidence_lookup_runtime_alert.outputs.evidence_lookup_first_missing_record_id }}, interrupt_id=${{ steps.evidence_lookup_runtime_alert.outputs.evidence_lookup_runtime_interrupt_id }}, first_repair=${{ steps.evidence_lookup_runtime_alert.outputs.evidence_lookup_runtime_first_repair_command }})."
          exit 1

      - name: Evidence lookup batch no-op branch
        if: ${{ steps.evidence_lookup_batch.outputs.evidence_lookup_ready != '1' }}
        run: |
          echo "No unresolved blocker/retest evidence IDs detected for batch lookup."

      - name: Fail on benchmark stale fallback alert creation error
        if: ${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_should_alert == '1' && steps.benchmark_stale.outputs.benchmark_stale_runtime_alert_created != '1' }}
        run: |
          echo "Benchmark stale fallback repeat threshold was met but runtime alert was not created (error=${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_error }})."
          exit 1

      - name: Benchmark stale fallback no-op branch
        if: ${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_should_alert != '1' }}
        run: |
          echo "No repeated benchmark stale fallback trend detected (recent_count=${{ steps.benchmark_stale.outputs.benchmark_stale_recent_count }}, threshold=${{ steps.benchmark_stale.outputs.benchmark_stale_repeat_threshold }})."

      - name: Fail on benchmark stale fallback rate gate
        if: ${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_rate_gate_blocking == '1' }}
        run: |
          echo "Benchmark stale fallback rate gate is blocking (recent_rate=${{ steps.benchmark_stale.outputs.benchmark_stale_recent_rate }}, latest_rolling_rate=${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_latest_rolling_rate }}, consecutive_breach_runs=${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_consecutive_rate_breach_runs }}, required=${{ steps.benchmark_stale.outputs.benchmark_stale_rate_consecutive_runs }}, ceiling=${{ steps.benchmark_stale.outputs.benchmark_stale_rate_ceiling }}, reason=${{ steps.benchmark_stale.outputs.benchmark_stale_runtime_rate_gate_reason }})."
          exit 1

      - name: Warning route branch
        if: ${{ steps.route.outputs.status == 'warning' }}
        run: |
          echo "Knowledge bootstrap routing is unresolved (status=${{ steps.route.outputs.status }}, phase=${{ steps.route.outputs.phase }}, route=${{ steps.route.outputs.route }}). Review route artifact before promoting automated actions."

      - name: Benchmark stale fallback branch
        if: ${{ steps.route.outputs.benchmark_stale_fallback == '1' }}
        run: |
          echo "Draft benchmark auto-reuse stale fallback detected (reason=${{ steps.route.outputs.benchmark_stale_reason }}, age_hours=${{ steps.route.outputs.benchmark_stale_age_hours }}, max_age_hours=${{ steps.route.outputs.benchmark_stale_max_age_hours }}). Action: ${{ steps.route.outputs.benchmark_stale_next_action }}"

      - name: Bootstrap route branch
        if: ${{ steps.route.outputs.route == 'bootstrap' }}
        run: |
          echo "Bootstrap route detected. Collect another knowledge snapshot before expecting delta comparisons."

      - name: Run-cycle route branch
        if: ${{ steps.route.outputs.route == 'run_cycle' }}
        run: |
          echo "Knowledge bootstrap is ready. Continue regular operator-cycle cadence."

      - name: No-op route branch
        if: ${{ steps.route.outputs.route == 'noop' }}
        run: |
          echo "Knowledge delta stage not requested or unresolved for this run."

      - name: Verify matrix coverage compact gate
        id: verify_matrix_compact
        run: |
          set -euo pipefail

          REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          COMPACT_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_compact.json"
          COMPACT_MARKDOWN_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_compact.md"

          python3 -m jarvis.cli improvement verify-matrix-compact \
            --report-path "${REPORT_PATH}" \
            --output-path "${COMPACT_PATH}" \
            --markdown-path "${COMPACT_MARKDOWN_PATH}" \
            --emit-github-output \
            --summary-heading "Verify Matrix Compact Coverage" \
            --summary-include-markdown \
            --json-compact > /dev/null

      - name: Open verify matrix coverage interrupt alert
        if: ${{ steps.verify_matrix_compact.outputs.missing_domain_count != '0' }}
        id: verify_matrix_coverage_alert
        env:
          VERIFY_MATRIX_COMPACT_PATH: ${{ steps.verify_matrix_compact.outputs.verify_matrix_compact_path }}
          VERIFY_MATRIX_COMPACT_STATUS: ${{ steps.verify_matrix_compact.outputs.verify_matrix_compact_status }}
          MISSING_DOMAIN_COUNT: ${{ steps.verify_matrix_compact.outputs.missing_domain_count }}
          MISSING_DOMAINS_CSV: ${{ steps.verify_matrix_compact.outputs.missing_domains_csv }}
          FIRST_MISSING_DOMAIN: ${{ steps.verify_matrix_compact.outputs.verify_matrix_first_missing_domain }}
          VERIFY_MATRIX_RECHECK_COMMAND: ${{ steps.verify_matrix_compact.outputs.verify_matrix_recheck_command }}
          VERIFY_MATRIX_FIRST_UNLOCK_READY_COMMAND: ${{ steps.verify_matrix_compact.outputs.verify_matrix_first_unlock_ready_command }}
        run: |
          set -euo pipefail

          COMPACT_PATH="${VERIFY_MATRIX_COMPACT_PATH:-$(pwd)/output/ci/operator_cycle/verify_matrix_compact.json}"
          ALERT_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_coverage_alert.json"
          DB_PATH="$(pwd)/output/ci/operator_cycle/jarvis.db"

          # Runtime emits memory event: improvement.verify_matrix_coverage_alert_created
          python3 -m jarvis.cli improvement verify-matrix-coverage-alert \
            --compact-path "${COMPACT_PATH}" \
            --output-path "${ALERT_PATH}" \
            --missing-domain-count "${MISSING_DOMAIN_COUNT}" \
            --missing-domains-csv "${MISSING_DOMAINS_CSV}" \
            --first-missing-domain "${FIRST_MISSING_DOMAIN}" \
            --compact-status "${VERIFY_MATRIX_COMPACT_STATUS}" \
            --recheck-command "${VERIFY_MATRIX_RECHECK_COMMAND}" \
            --first-unlock-ready-command "${VERIFY_MATRIX_FIRST_UNLOCK_READY_COMMAND}" \
            --repo-path "$(pwd)" \
            --db-path "${DB_PATH}" \
            --emit-github-output \
            --summary-heading "Verify Matrix Coverage Interrupt Alert" \
            --json-compact > /dev/null

      - name: Fail on verify matrix coverage gaps
        if: ${{ steps.verify_matrix_compact.outputs.missing_domain_count != '0' }}
        run: |
          echo "Verify matrix coverage is missing required domains (count=${{ steps.verify_matrix_compact.outputs.missing_domain_count }}, first=${{ steps.verify_matrix_compact.outputs.verify_matrix_first_missing_domain }}, domains=${{ steps.verify_matrix_compact.outputs.missing_domains_csv }}, interrupt_id=${{ steps.verify_matrix_coverage_alert.outputs.verify_matrix_coverage_interrupt_id }}, first_repair=${{ steps.verify_matrix_coverage_alert.outputs.verify_matrix_coverage_first_repair_command }})."
          exit 1

      - name: Guardrail gate
        id: guardrail
        run: |
          set -euo pipefail

          REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          GATE_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_guardrail_gate.json"

          python3 -m jarvis.cli improvement verify-matrix-guardrail-gate \
            --report-path "${REPORT_PATH}" \
            --output-path "${GATE_PATH}" \
            --emit-github-output \
            --summary-heading "Operator Guardrail Gate" \
            --strict \
            --json-compact > /dev/null

      - name: Guardrail diagnostics
        if: ${{ failure() && steps.guardrail.outcome == 'failure' }}
        run: |
          set -euo pipefail

          GATE_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_guardrail_gate.json"
          REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          DAILY_PATH="$(pwd)/output/ci/operator_cycle/daily_pipeline_report.json"

          if [[ -f "${GATE_PATH}" ]]; then
            echo "Guardrail gate payload:"
            jq '{status, failure_reason, stage_error_count, verify_matrix_status, guardrail_gate_stage_error_count, guardrail_gate_verify_matrix_status}' "${GATE_PATH}"
          else
            echo "Guardrail gate payload missing at ${GATE_PATH}."
          fi

          if [[ -f "${REPORT_PATH}" ]]; then
            echo "Operator cycle stage status summary:"
            jq '{status, stage_error_count, stage_statuses}' "${REPORT_PATH}"
          else
            echo "Operator cycle report missing at ${REPORT_PATH}."
          fi

          if [[ -f "${DAILY_PATH}" ]]; then
            echo "Top daily pipeline errors (first 5):"
            jq '{
              status,
              error_count,
              first_errors: ((.errors // [])[:5] | map({
                index,
                error,
                hypothesis_id: (.hypothesis_id // "none"),
                strategy: ((.resolution // {}).strategy // "none"),
                domain: ((.resolution // {}).domain // "none"),
                friction_key: ((.resolution // {}).friction_key // "none")
              }))
            }' "${DAILY_PATH}"
          else
            echo "Daily pipeline report missing at ${DAILY_PATH}."
          fi

      - name: Collect debug trace artifacts
        if: always()
        run: |
          mkdir -p output/ci
          if [[ -d configs/improvement_operator_knowledge_stack/output/debug_runs ]]; then
            cp -R configs/improvement_operator_knowledge_stack/output/debug_runs output/ci/debug_runs
          fi
          if [[ -d analysis/improvement/knowledge_snapshots ]]; then
            cp -R analysis/improvement/knowledge_snapshots output/ci/knowledge_snapshots
          fi

      - name: Upload route artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: knowledge-bootstrap-route
          path: output/ci/

      - name: Fail workflow on warning status
        if: ${{ steps.route.outputs.route_blocking == '1' }}
        run: |
          echo "Knowledge route is blocking (status=${{ steps.route.outputs.status }}, phase=${{ steps.route.outputs.phase }}, route=${{ steps.route.outputs.route }})."
          exit 1
