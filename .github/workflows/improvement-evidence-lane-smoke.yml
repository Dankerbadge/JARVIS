name: improvement-evidence-lane-smoke

on:
  workflow_dispatch:
  pull_request:

jobs:
  evidence-lane-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run evidence lane smoke
        run: |
          mkdir -p output/ci
          ./scripts/run_improvement_evidence_lane_smoke.sh \
            --workspace-dir ./output/ci/evidence_lane_smoke \
            --strict > /dev/null

      - name: Upload evidence lane smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evidence-lane-smoke
          path: output/ci/evidence_lane_smoke/
