name: improvement-domain-smoke-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "40 3 * * 1-5"

jobs:
  domain-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        domain:
          - quant_finance
          - kalshi_weather
          - fitness_apps
          - market_ml
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run domain smoke loop
        run: |
          mkdir -p "output/ci/domain_smoke/${{ matrix.domain }}"
          ./scripts/run_improvement_domain_smoke.sh \
            ./configs/improvement_operator_knowledge_stack.json \
            "${{ matrix.domain }}" \
            --output-dir "output/ci/domain_smoke/${{ matrix.domain }}" \
            --allow-missing

      - name: Extract domain smoke outputs
        id: smoke
        env:
          MATRIX_DOMAIN: ${{ matrix.domain }}
        run: |
          python3 -m jarvis.cli improvement domain-smoke-outputs \
            --domain "${MATRIX_DOMAIN}" \
            --artifact-root output/ci/domain_smoke \
            --emit-github-output \
            --summary-heading "Domain Smoke"

      - name: Warning smoke branch
        if: ${{ steps.smoke.outputs.smoke_blocking == '1' }}
        run: |
          echo "Domain smoke run requires attention (domain=${{ steps.smoke.outputs.domain }}, status=${{ steps.smoke.outputs.status }}, reason=${{ steps.smoke.outputs.reason }})."

      - name: Healthy smoke branch
        if: ${{ steps.smoke.outputs.smoke_blocking == '0' }}
        run: |
          echo "Domain smoke run healthy (domain=${{ steps.smoke.outputs.domain }}, status=${{ steps.smoke.outputs.status }})."

      - name: Open domain smoke interrupt alert
        if: ${{ steps.smoke.outputs.smoke_blocking == '1' }}
        id: smoke_alert
        env:
          MATRIX_DOMAIN: ${{ matrix.domain }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.status }}
          SMOKE_REASON: ${{ steps.smoke.outputs.reason }}
          SUMMARY_PATH: ${{ steps.smoke.outputs.summary_path }}
          PULL_REPORT_PATH: ${{ steps.smoke.outputs.pull_report_path }}
          LEADERBOARD_REPORT_PATH: ${{ steps.smoke.outputs.leaderboard_report_path }}
          SEED_REPORT_PATH: ${{ steps.smoke.outputs.seed_report_path }}
        run: |
          python3 -m jarvis.cli improvement domain-smoke-runtime-alert \
            --domain "${MATRIX_DOMAIN}" \
            --smoke-status "${SMOKE_STATUS}" \
            --smoke-reason "${SMOKE_REASON}" \
            --summary-path "${SUMMARY_PATH}" \
            --pull-report-path "${PULL_REPORT_PATH}" \
            --leaderboard-report-path "${LEADERBOARD_REPORT_PATH}" \
            --seed-report-path "${SEED_REPORT_PATH}" \
            --emit-github-output \
            --summary-heading "Domain Smoke Interrupt Alert"

      - name: Collect debug trace artifacts
        if: always()
        run: |
          domain_dir="output/ci/domain_smoke/${{ matrix.domain }}"
          mkdir -p "${domain_dir}"
          if [[ -d configs/improvement_operator_knowledge_stack/output/debug_runs ]]; then
            cp -R configs/improvement_operator_knowledge_stack/output/debug_runs "${domain_dir}/debug_runs"
          fi
          if [[ -d analysis/improvement/knowledge_snapshots ]]; then
            cp -R analysis/improvement/knowledge_snapshots "${domain_dir}/knowledge_snapshots"
          fi

      - name: Upload domain smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: domain-smoke-${{ matrix.domain }}
          path: output/ci/domain_smoke/${{ matrix.domain }}/

      - name: Fail workflow on warning status
        if: ${{ steps.smoke.outputs.smoke_blocking == '1' }}
        run: |
          echo "Domain smoke blocking status detected (domain=${{ steps.smoke.outputs.domain }}, reason=${{ steps.smoke.outputs.reason }}, interrupt_id=${{ steps.smoke_alert.outputs.interrupt_id }}, rerun=${{ steps.smoke_alert.outputs.rerun_command }})."
          exit 1

  domain-smoke-aggregate:
    if: always()
    needs:
      - domain-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Download domain smoke artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: domain-smoke-*
          path: output/ci/domain_smoke_artifacts

      - name: Build cross-domain smoke summary
        id: aggregate
        run: |
          python3 -m jarvis.cli improvement domain-smoke-cross-domain-compact \
            --artifacts-root output/ci/domain_smoke_artifacts \
            --output-path output/ci/domain_smoke/domain_smoke_cross_domain_summary.json \
            --markdown-path output/ci/domain_smoke/domain_smoke_cross_domain_summary.md \
            --emit-github-output \
            --summary-heading "Domain Smoke Cross-Domain Summary"

      - name: Open cross-domain smoke interrupt alert
        if: ${{ steps.aggregate.outputs.cross_domain_status == 'warning' && steps.aggregate.outputs.warning_count != '0' }}
        id: cross_domain_alert
        env:
          SUMMARY_PATH: ${{ steps.aggregate.outputs.summary_path }}
          WARNING_COUNT: ${{ steps.aggregate.outputs.warning_count }}
          BLOCKING_COUNT: ${{ steps.aggregate.outputs.blocking_count }}
          TOP_DOMAIN: ${{ steps.aggregate.outputs.top_domain }}
          TOP_RISK_SCORE: ${{ steps.aggregate.outputs.top_risk_score }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from jarvis.ids import new_id
          from jarvis.interrupts import InterruptDecision
          from jarvis.runtime import JarvisRuntime

          def _to_int(value: str, default: int = 0) -> int:
            try:
              return int(float(str(value).strip()))
            except Exception:
              return default

          summary_path = Path(str(os.getenv("SUMMARY_PATH") or "")).expanduser().resolve()
          summary_payload: dict = {}
          if summary_path.exists():
            try:
              loaded = json.loads(summary_path.read_text(encoding="utf-8"))
            except Exception:
              loaded = {}
            if isinstance(loaded, dict):
              summary_payload = loaded

          warning_count = _to_int(os.getenv("WARNING_COUNT") or summary_payload.get("warning_count"), default=0)
          blocking_count = _to_int(os.getenv("BLOCKING_COUNT") or summary_payload.get("blocking_count"), default=0)
          top_domain = str(os.getenv("TOP_DOMAIN") or summary_payload.get("top_domain") or "none").strip().lower() or "none"
          top_risk_score = _to_int(
            os.getenv("TOP_RISK_SCORE") or summary_payload.get("top_risk_score"),
            default=0,
          )
          top_risks = [
            row
            for row in list(summary_payload.get("top_risks") or [])
            if isinstance(row, dict)
          ]

          alert_path = Path("output/ci/domain_smoke/domain_smoke_cross_domain_alert.json").resolve()
          alert_path.parent.mkdir(parents=True, exist_ok=True)
          db_path = (alert_path.parent / "jarvis.db").resolve()

          rerun_commands = [
            str(row.get("rerun_command") or "").strip()
            for row in top_risks[:3]
            if str(row.get("rerun_command") or "").strip()
          ]
          domain_refs = [
            f"{str(row.get('domain') or 'unknown').strip().lower()}:{str(row.get('smoke_reason') or 'none').strip()}"
            for row in top_risks[:3]
          ]
          compact_refs = ",".join(domain_refs) if domain_refs else "none"
          rerun_command = rerun_commands[0] if rerun_commands else (
            "./scripts/run_improvement_domain_smoke.sh "
            "./configs/improvement_operator_knowledge_stack.json "
            f"{top_domain if top_domain != 'none' else 'quant_finance'} --allow-missing"
          )
          rerun_preview_commands = list(rerun_commands)
          if rerun_command and rerun_command not in rerun_preview_commands:
            rerun_preview_commands.append(rerun_command)
          rerun_command_count = len(rerun_preview_commands)
          first_rerun_command = rerun_preview_commands[0] if rerun_preview_commands else "none"

          reason = (
            "cross_domain_smoke_warning"
            + f" warning_count={warning_count}"
            + f" blocking_count={blocking_count}"
            + f" top_domain={top_domain}"
            + f" top_risk_score={top_risk_score}"
            + f" refs={compact_refs}"
          )
          why_now = (
            "cross-domain smoke aggregate detected active warning lanes and requires centralized triage "
            "before promotion cadence continues."
          )
          why_not_later = (
            "delayed cross-domain smoke triage can compound ingestion and seed-quality drift across "
            "quant, Kalshi weather, fitness, and market-ml loops."
          )

          interrupt_id = ""
          acknowledge_command = "none"
          runtime_error = "none"
          runtime = None
          try:
            runtime = JarvisRuntime(
              db_path=db_path,
              repo_path=Path.cwd(),
            )
            urgency_score = 0.96 if blocking_count > 0 else 0.91
            confidence = 0.92 if top_risk_score >= 80 else 0.88
            decision = InterruptDecision(
              interrupt_id=new_id("int"),
              candidate_id=new_id("cand"),
              domain="operations",
              reason=reason,
              urgency_score=urgency_score,
              confidence=confidence,
              suppression_window_hit=False,
              delivered=True,
              why_now=why_now,
              why_not_later=why_not_later,
              status="delivered",
            )
            runtime.interrupt_store.store(decision)
            interrupt = runtime.interrupt_store.get(decision.interrupt_id) or decision.to_dict()
            interrupt_id = str(interrupt.get("interrupt_id") or "").strip()
            if interrupt_id:
              acknowledge_command = (
                "python3 -m jarvis.cli interrupts acknowledge "
                f"{interrupt_id} --actor operator --db-path {db_path}"
              )
            runtime.memory.append_event(
              "improvement.domain_smoke_cross_domain_alert_created",
              {
                "interrupt_id": interrupt_id or None,
                "summary_path": str(summary_path),
                "warning_count": warning_count,
                "blocking_count": blocking_count,
                "top_domain": top_domain,
                "top_risk_score": top_risk_score,
                "top_risks": top_risks[:3],
                "rerun_commands": rerun_commands,
              },
            )
          except Exception as exc:  # pragma: no cover - workflow inline guard
            runtime_error = str(exc).strip() or "unknown_runtime_error"
          finally:
            if runtime is not None:
              runtime.close()

          payload = {
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "status": "warning",
            "summary_path": str(summary_path),
            "warning_count": warning_count,
            "blocking_count": blocking_count,
            "top_domain": top_domain,
            "top_risk_score": top_risk_score,
            "top_risks": top_risks[:3],
            "alert_created": bool(interrupt_id),
            "interrupt_id": interrupt_id or None,
            "interrupt_db_path": str(db_path),
            "acknowledge_command": None if acknowledge_command == "none" else acknowledge_command,
            "rerun_command": rerun_command,
            "rerun_commands": rerun_commands,
            "rerun_preview_commands": rerun_preview_commands,
            "rerun_command_count": rerun_command_count,
            "first_rerun_command": first_rerun_command,
            "reason": reason,
            "why_now": why_now,
            "why_not_later": why_not_later,
            "runtime_error": None if runtime_error == "none" else runtime_error,
          }
          suggested_actions = [
            str(item).strip()
            for item in list(summary_payload.get("suggested_actions") or [])
            if str(item).strip()
          ]
          suggested_action_count = len(suggested_actions)
          first_suggested_action = suggested_actions[0] if suggested_actions else "none"

          existing_bundle = dict(summary_payload.get("operator_ack_bundle") or {})
          bundle_commands = [
            str(command).strip()
            for command in list(existing_bundle.get("commands") or summary_payload.get("acknowledge_bundle_commands") or [])
            if str(command).strip()
          ]
          if not bundle_commands:
            for row in list(summary_payload.get("domains") or []):
              if not isinstance(row, dict):
                continue
              row_ack_command = str(row.get("acknowledge_command") or "").strip()
              if row_ack_command and row_ack_command not in bundle_commands:
                bundle_commands.append(row_ack_command)
          per_domain_command_count = len(bundle_commands)
          if acknowledge_command != "none" and acknowledge_command not in bundle_commands:
            bundle_commands.append(acknowledge_command)
          cross_domain_command_count = 1 if acknowledge_command != "none" and acknowledge_command in bundle_commands else 0
          bundle_command_count = len(bundle_commands)
          first_acknowledge_command = bundle_commands[0] if bundle_commands else "none"
          bundle_sequence = " && ".join(bundle_commands) if bundle_commands else "none"
          summary_payload["operator_ack_bundle"] = {
            "status": "ready" if bundle_commands else "empty",
            "command_count": bundle_command_count,
            "commands": bundle_commands,
            "command_sequence": bundle_sequence,
            "first_command": None if first_acknowledge_command == "none" else first_acknowledge_command,
            "per_domain_command_count": per_domain_command_count,
            "cross_domain_command_count": cross_domain_command_count,
            "cross_domain_interrupt_id": interrupt_id or None,
            "cross_domain_acknowledge_command": None if acknowledge_command == "none" else acknowledge_command,
          }
          summary_payload["acknowledge_bundle_commands"] = bundle_commands
          summary_payload["acknowledge_bundle_command_sequence"] = bundle_sequence
          summary_payload["acknowledge_command_count"] = bundle_command_count
          summary_payload["first_acknowledge_command"] = first_acknowledge_command
          summary_payload["rerun_preview_commands"] = rerun_preview_commands
          summary_payload["rerun_command_count"] = rerun_command_count
          summary_payload["first_rerun_command"] = first_rerun_command
          summary_payload["suggested_action_count"] = suggested_action_count
          summary_payload["first_suggested_action"] = first_suggested_action
          summary_payload["cross_domain_interrupt_id"] = interrupt_id or None
          summary_payload["cross_domain_alert_path"] = str(alert_path)
          if summary_path:
            summary_path.parent.mkdir(parents=True, exist_ok=True)
            summary_path.write_text(json.dumps(summary_payload, indent=2), encoding="utf-8")

          payload["acknowledge_bundle_commands"] = bundle_commands
          payload["acknowledge_bundle_command_sequence"] = bundle_sequence
          payload["acknowledge_command_count"] = bundle_command_count
          payload["first_acknowledge_command"] = first_acknowledge_command
          payload["rerun_command_count"] = rerun_command_count
          payload["first_rerun_command"] = first_rerun_command
          payload["suggested_actions"] = suggested_actions
          payload["suggested_action_count"] = suggested_action_count
          payload["first_suggested_action"] = first_suggested_action
          alert_path.write_text(json.dumps(payload, indent=2), encoding="utf-8")

          print(f"cross_domain_alert_path={alert_path}")
          print(f"cross_domain_interrupt_id={interrupt_id or 'none'}")
          print(f"cross_domain_alert_created={1 if interrupt_id else 0}")
          print(f"cross_domain_acknowledge_command={acknowledge_command}")
          print(f"cross_domain_rerun_command={rerun_command}")
          print(f"suggested_action_count={suggested_action_count}")
          print(f"first_suggested_action={first_suggested_action}")
          print(f"acknowledge_command_count={bundle_command_count}")
          print(f"first_acknowledge_command={first_acknowledge_command}")
          print(f"rerun_command_count={rerun_command_count}")
          print(f"first_rerun_command={first_rerun_command}")
          print(f"acknowledge_bundle_command_sequence={bundle_sequence}")
          print(f"cross_domain_runtime_error={runtime_error}")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
            handle.write(f"cross_domain_alert_path={alert_path}\n")
            handle.write(f"cross_domain_interrupt_id={interrupt_id or 'none'}\n")
            handle.write(f"cross_domain_alert_created={1 if interrupt_id else 0}\n")
            handle.write(f"cross_domain_acknowledge_command={acknowledge_command}\n")
            handle.write(f"cross_domain_rerun_command={rerun_command}\n")
            handle.write(f"suggested_action_count={suggested_action_count}\n")
            handle.write(f"first_suggested_action={first_suggested_action}\n")
            handle.write(f"acknowledge_command_count={bundle_command_count}\n")
            handle.write(f"first_acknowledge_command={first_acknowledge_command}\n")
            handle.write(f"rerun_command_count={rerun_command_count}\n")
            handle.write(f"first_rerun_command={first_rerun_command}\n")
            handle.write(f"acknowledge_bundle_command_sequence={bundle_sequence}\n")
            handle.write(f"cross_domain_runtime_error={runtime_error}\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_output = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Domain Smoke Cross-Domain Interrupt Alert",
              "",
              f"- interrupt_id: `{interrupt_id or 'none'}`",
              f"- alert_created: `{1 if interrupt_id else 0}`",
              f"- warning_count: `{warning_count}`",
              f"- blocking_count: `{blocking_count}`",
              f"- top_domain: `{top_domain}`",
              f"- top_risk_score: `{top_risk_score}`",
              f"- rerun_command: `{rerun_command}`",
              f"- acknowledge_command: `{acknowledge_command}`",
              f"- suggested_action_count: `{suggested_action_count}`",
              f"- first_suggested_action: `{first_suggested_action}`",
              f"- acknowledge_command_count: `{bundle_command_count}`",
              f"- first_acknowledge_command: `{first_acknowledge_command}`",
              f"- rerun_command_count: `{rerun_command_count}`",
              f"- first_rerun_command: `{first_rerun_command}`",
              f"- acknowledge_bundle_command_sequence: `{bundle_sequence}`",
              f"- runtime_error: `{runtime_error}`",
              "",
            ]
            with summary_output.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Upload cross-domain smoke summary artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: domain-smoke-cross-domain-summary
          path: |
            output/ci/domain_smoke/domain_smoke_cross_domain_summary.json
            output/ci/domain_smoke/domain_smoke_cross_domain_summary.md
            output/ci/domain_smoke/domain_smoke_cross_domain_alert.json
