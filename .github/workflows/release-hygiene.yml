name: release-hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "release/**"

jobs:
  release-hygiene:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Build clean release archive
        run: |
          chmod +x ./scripts/build_release_zip.sh
          ./scripts/build_release_zip.sh M10 /tmp/JARVIS_M10_CLEAN_WIRED.zip

      - name: Show release artifacts
        run: |
          ls -lh /tmp/JARVIS_M10_CLEAN_WIRED.zip
          ls -lh /tmp/JARVIS_M10_CLEAN_WIRED.manifest.json
          ls -lh /tmp/JARVIS_M10_CLEAN_WIRED.scan_report.json
