name: reconcile-codeowner-review-gate

on:
  workflow_run:
    workflows:
      - reconcile-codeowner-review-gate-drift-check
    types:
      - completed
    branches:
      - main

concurrency:
  group: reconcile-codeowner-review-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard reconcile trigger event
        run: |
          EVENT_NAME="${{ github.event_name }}"
          if [[ "${EVENT_NAME}" != "workflow_run" ]]; then
            echo "::error title=Unexpected reconcile trigger event::reconcile-codeowner-review-gate must run only from workflow_run, got ${EVENT_NAME}."
            exit 1
          fi
          echo "Reconcile trigger event verified (${EVENT_NAME})."

      - name: Reconcile code-owner review gate
        id: reconcile
        env:
          GH_TOKEN: ${{ secrets.JARVIS_ADMIN_GH_TOKEN }}
        run: |
          mkdir -p output/ci
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "JARVIS_ADMIN_GH_TOKEN is not set; skipping reconcile run."
            printf '%s\n' \
              '{' \
              '  "status": "skipped",' \
              '  "reason": "missing_secret",' \
              '  "required_secret": "JARVIS_ADMIN_GH_TOKEN"' \
              '}' \
              > output/ci/codeowner_review_reconcile.json
            exit 0
          fi

          bash ./scripts/reconcile_codeowner_review_gate.sh \
            --repo-slug Dankerbadge/JARVIS \
            --branch main \
            --min-collaborators 2 \
            --required-status-check gate-status \
            --required-status-check evidence-lane-smoke \
            --required-status-check release-hygiene \
            --required-status-check-strict true \
            --source-workflow-run-id "${{ github.event.workflow_run.id }}" \
            --source-workflow-run-conclusion "${{ github.event.workflow_run.conclusion }}" \
            --source-workflow-name "${{ github.event.workflow_run.name }}" \
            --source-workflow-event "${{ github.event.workflow_run.event }}" \
            --source-workflow-run-url "${{ github.event.workflow_run.html_url }}" \
            --apply \
            > output/ci/codeowner_review_reconcile.json

          python3 -m jarvis.cli improvement reconcile-codeowner-review-gate-outputs \
            --report-path output/ci/codeowner_review_reconcile.json \
            --emit-github-output

      - name: Fail when reconcile admin token is missing
        run: |
          if [ ! -f output/ci/codeowner_review_reconcile.json ]; then
            echo "::error title=Missing reconcile report::output/ci/codeowner_review_reconcile.json was not generated."
            exit 1
          fi
          if grep -q '"reason": "missing_secret"' output/ci/codeowner_review_reconcile.json; then
            echo "::error title=Missing JARVIS admin token::JARVIS_ADMIN_GH_TOKEN is required for reconcile-codeowner-review-gate."
            exit 1
          fi

      - name: Upload reconcile artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeowner-review-reconcile
          path: output/ci/codeowner_review_reconcile.json

      - name: Print reconcile summary
        if: always()
        run: |
          echo "collaborator_count=${{ steps.reconcile.outputs.collaborator_count || 'n/a' }}"
          echo "current_require_code_owner_reviews=${{ steps.reconcile.outputs.current_require_code_owner_reviews || 'n/a' }}"
          echo "desired_require_code_owner_reviews=${{ steps.reconcile.outputs.desired_require_code_owner_reviews || 'n/a' }}"
          echo "current_required_approving_review_count=${{ steps.reconcile.outputs.current_required_approving_review_count || 'n/a' }}"
          echo "desired_required_approving_review_count=${{ steps.reconcile.outputs.desired_required_approving_review_count || 'n/a' }}"
          echo "current_require_last_push_approval=${{ steps.reconcile.outputs.current_require_last_push_approval || 'n/a' }}"
          echo "desired_require_last_push_approval=${{ steps.reconcile.outputs.desired_require_last_push_approval || 'n/a' }}"
          echo "current_required_status_checks_csv=${{ steps.reconcile.outputs.current_required_status_checks_csv || 'n/a' }}"
          echo "desired_required_status_checks_csv=${{ steps.reconcile.outputs.desired_required_status_checks_csv || 'n/a' }}"
          echo "required_status_checks_change_needed=${{ steps.reconcile.outputs.required_status_checks_change_needed || 'n/a' }}"
          echo "source_workflow_run_id=${{ steps.reconcile.outputs.source_workflow_run_id || 'n/a' }}"
          echo "source_workflow_run_conclusion=${{ steps.reconcile.outputs.source_workflow_run_conclusion || 'n/a' }}"
          echo "source_workflow_name=${{ steps.reconcile.outputs.source_workflow_name || 'n/a' }}"
          echo "source_workflow_event=${{ steps.reconcile.outputs.source_workflow_event || 'n/a' }}"
          echo "source_workflow_run_url=${{ steps.reconcile.outputs.source_workflow_run_url || 'n/a' }}"
