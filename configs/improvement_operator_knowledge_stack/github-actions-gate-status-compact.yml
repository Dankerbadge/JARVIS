name: improvement-gate-status-compact

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  gate-status:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Evaluate critical drift gate queue
        id: gate
        continue-on-error: true
        run: |
          mkdir -p output/ci
          python3 -m jarvis.cli plans gate-status-all \
            --limit 25 \
            --only-blocked \
            --fail-on-blocked \
            --fail-on-errors \
            --fail-on-zero-scanned \
            --fail-on-zero-evaluated \
            --fail-on-zero-unlock-ready \
            --fail-on-empty-ack-commands \
            --blocked-exit-code 7 \
            --error-exit-code 11 \
            --zero-scanned-exit-code 17 \
            --zero-evaluated-exit-code 13 \
            --zero-unlock-ready-exit-code 23 \
            --empty-ack-commands-exit-code 19 \
            --emit-ci-json-path output/ci/gate_status_all_compact.json \
            --emit-github-output \
            --summary-heading "Gate Status Compact" \
            --output text

      - name: Blocked queue branch
        if: ${{ steps.gate.outputs.blocked_step_count != '0' }}
        run: |
          echo "Blocked review steps detected (blocked=${{ steps.gate.outputs.blocked_step_count }}, unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}). First acknowledge command: ${{ steps.gate.outputs.first_acknowledge_command }}. Check the compact artifact and markdown summary for full acknowledge commands."

      - name: Healthy queue branch
        if: ${{ steps.gate.outputs.blocked_step_count == '0' && steps.gate.outputs.exit_reason == 'none' }}
        run: |
          echo "No blocking critical drift alerts across scanned review steps (unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}). First unlock-ready command: ${{ steps.gate.outputs.first_unlock_ready_command }}."

      - name: Zero unlock-ready branch
        if: ${{ steps.gate.outputs.exit_reason == 'zero_unlock_ready_steps' }}
        run: |
          echo "No unlock-ready steps were found (blocked=${{ steps.gate.outputs.blocked_step_count }}, unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}). Review blocker acknowledgements and rerun gate-status-all after promotion candidates are unblocked."

      - name: Fail workflow on non-none exit reason
        if: ${{ steps.gate.outputs.exit_reason != 'none' && steps.gate.outputs.exit_reason != 'zero_unlock_ready_steps' }}
        run: |
          echo "Gate evaluation failed with exit_reason=${{ steps.gate.outputs.exit_reason }} exit_code=${{ steps.gate.outputs.exit_code }} blocked=${{ steps.gate.outputs.blocked_step_count }} unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}"
          exit 1
