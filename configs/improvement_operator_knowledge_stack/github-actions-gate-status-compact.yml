name: improvement-gate-status-compact

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  gate-status:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Evaluate critical drift gate queue
        id: gate_eval
        continue-on-error: true
        run: |
          mkdir -p output/ci
          python3 -m jarvis.cli plans gate-status-all \
            --limit 25 \
            --only-blocked \
            --fail-on-blocked \
            --fail-on-errors \
            --fail-on-zero-scanned \
            --fail-on-zero-evaluated \
            --fail-on-zero-unlock-ready \
            --fail-on-empty-ack-commands \
            --blocked-exit-code 7 \
            --error-exit-code 11 \
            --zero-scanned-exit-code 17 \
            --zero-evaluated-exit-code 13 \
            --zero-unlock-ready-exit-code 23 \
            --empty-ack-commands-exit-code 19 \
            --emit-ci-json-path output/ci/gate_status_all_compact.json \
            --output text

      - name: Extract compact gate outputs
        id: gate
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_path = Path("output/ci/gate_status_all_compact.json").resolve()
          payload = json.loads(artifact_path.read_text(encoding="utf-8"))

          blocked_step_count = int(payload.get("blocked_step_count") or 0)
          unlock_ready_step_count = int(payload.get("unlock_ready_step_count") or 0)
          error_count = int(payload.get("error_count") or 0)
          acknowledge_commands = [
              str(command).strip()
              for command in (payload.get("acknowledge_commands") or [])
              if str(command).strip()
          ]
          unlock_ready_commands = [
              str(command).strip()
              for command in (payload.get("unlock_ready_commands") or [])
              if str(command).strip()
          ]
          if not unlock_ready_commands:
              unlock_ready_commands = [
                  str((row or {}).get("recheck_command") or "").strip()
                  for row in list(payload.get("unlock_ready_steps") or [])
                  if str((row or {}).get("recheck_command") or "").strip()
              ]
          first_unlock_ready_command = (
              str(payload.get("first_unlock_ready_command") or "").strip()
              or (unlock_ready_commands[0] if unlock_ready_commands else "none")
          )
          first_unlock_ready_command_output = first_unlock_ready_command.replace("\n", " ").strip() or "none"
          acknowledge_command_count = len(acknowledge_commands)
          first_acknowledge_command = acknowledge_commands[0] if acknowledge_commands else "none"
          first_acknowledge_command_output = first_acknowledge_command.replace("\n", " ").strip() or "none"
          exit_reason = str(payload.get("exit_reason") or "none").strip() or "none"
          exit_code = int(payload.get("exit_code") or 0)

          print(f"artifact_path={artifact_path}")
          print(f"blocked_step_count={blocked_step_count}")
          print(f"unlock_ready_step_count={unlock_ready_step_count}")
          print(f"first_unlock_ready_command={first_unlock_ready_command_output}")
          print(f"error_count={error_count}")
          print(f"acknowledge_command_count={acknowledge_command_count}")
          print(f"first_acknowledge_command={first_acknowledge_command_output}")
          print(f"exit_reason={exit_reason}")
          print(f"exit_code={exit_code}")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"artifact_path={artifact_path}\n")
              handle.write(f"blocked_step_count={blocked_step_count}\n")
              handle.write(f"unlock_ready_step_count={unlock_ready_step_count}\n")
              handle.write(f"first_unlock_ready_command={first_unlock_ready_command_output}\n")
              handle.write(f"error_count={error_count}\n")
              handle.write(f"acknowledge_command_count={acknowledge_command_count}\n")
              handle.write(f"first_acknowledge_command={first_acknowledge_command_output}\n")
              handle.write(f"exit_reason={exit_reason}\n")
              handle.write(f"exit_code={exit_code}\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
              summary_path = Path(github_step_summary).expanduser()
              summary_lines = [
                  "## Gate Status Compact",
                  "",
                  f"- blocked_step_count: `{blocked_step_count}`",
                  f"- unlock_ready_step_count: `{unlock_ready_step_count}`",
                  f"- first_unlock_ready_command: `{first_unlock_ready_command_output}`",
                  f"- error_count: `{error_count}`",
                  f"- acknowledge_command_count: `{acknowledge_command_count}`",
                  f"- first_acknowledge_command: `{first_acknowledge_command_output}`",
                  f"- exit_reason: `{exit_reason}`",
                  f"- exit_code: `{exit_code}`",
                  "",
              ]
              with summary_path.open("a", encoding="utf-8") as handle:
                  handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Blocked queue branch
        if: ${{ steps.gate.outputs.blocked_step_count != '0' }}
        run: |
          echo "Blocked review steps detected (blocked=${{ steps.gate.outputs.blocked_step_count }}, unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}). First acknowledge command: ${{ steps.gate.outputs.first_acknowledge_command }}. Check the compact artifact and markdown summary for full acknowledge commands."

      - name: Healthy queue branch
        if: ${{ steps.gate.outputs.blocked_step_count == '0' && steps.gate.outputs.exit_reason == 'none' }}
        run: |
          echo "No blocking critical drift alerts across scanned review steps (unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}). First unlock-ready command: ${{ steps.gate.outputs.first_unlock_ready_command }}."

      - name: Zero unlock-ready branch
        if: ${{ steps.gate.outputs.exit_reason == 'zero_unlock_ready_steps' }}
        run: |
          echo "No unlock-ready steps were found (blocked=${{ steps.gate.outputs.blocked_step_count }}, unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}). Review blocker acknowledgements and rerun gate-status-all after promotion candidates are unblocked."

      - name: Fail workflow on non-none exit reason
        if: ${{ steps.gate.outputs.exit_reason != 'none' }}
        run: |
          echo "Gate evaluation failed with exit_reason=${{ steps.gate.outputs.exit_reason }} exit_code=${{ steps.gate.outputs.exit_code }} blocked=${{ steps.gate.outputs.blocked_step_count }} unlock_ready=${{ steps.gate.outputs.unlock_ready_step_count }}"
          exit 1
