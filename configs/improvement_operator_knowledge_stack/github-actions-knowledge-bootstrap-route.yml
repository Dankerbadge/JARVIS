name: improvement-knowledge-bootstrap-route

on:
  workflow_dispatch:
  schedule:
    - cron: "25 13 * * 1-5"

jobs:
  knowledge-route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run operator cycle + knowledge route
        run: |
          mkdir -p output/ci
          ./scripts/run_improvement_operator_cycle.sh \
            ./configs/improvement_operator_knowledge_stack.json \
            --output-dir output/ci/operator_cycle \
            --seed-enable \
            --seed-domains quant_finance,kalshi_weather,fitness_apps,market_ml \
            --draft-enable \
            --benchmark-enable \
            --verify-matrix-enable \
            --verify-matrix-path ./configs/improvement_operator_knowledge_stack/matrices/controlled_experiment_matrix.json \
            --verify-matrix-alert-enable \
            --knowledge-brief-enable \
            --knowledge-delta-alert-enable \
            --knowledge-route-enable \
            --knowledge-route-output-path output/ci/knowledge_bootstrap_route.json

      - name: Extract initial knowledge route outputs
        id: route_initial
        run: |
          set -euo pipefail

          ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route.json"
          ROUTE_OUTPUT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_initial_outputs.json"

          python3 -m jarvis.cli improvement knowledge-bootstrap-route-outputs \
            --artifact-path "${ROUTE_ARTIFACT_PATH}" \
            --artifact-source initial \
            --output-path "${ROUTE_OUTPUT_PATH}" \
            --json-compact > /dev/null

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path("output/ci/knowledge_bootstrap_route_initial_outputs.json").resolve()
          if not output_path.exists():
            raise SystemExit(f"missing_knowledge_bootstrap_route_initial_outputs:{output_path}")

          payload = json.loads(output_path.read_text(encoding="utf-8"))
          if not isinstance(payload, dict):
            raise SystemExit("invalid_knowledge_bootstrap_route_initial_outputs:expected_json_object")

          artifact_path = str(payload.get("artifact_path") or "").strip() or "none"
          status = str(payload.get("status") or "warning").strip() or "warning"
          phase = str(payload.get("phase") or "unknown").strip() or "unknown"
          route = str(payload.get("route") or "noop").strip() or "noop"
          route_blocking = int(payload.get("route_blocking") or 0)
          next_action = str(payload.get("next_action") or "").strip() or "none"
          next_action_command = str(payload.get("next_action_command") or "").strip() or "none"

          print(f"artifact_path={artifact_path}")
          print(f"status={status}")
          print(f"phase={phase}")
          print(f"route={route}")
          print(f"route_blocking={route_blocking}")
          print(f"next_action={next_action}")
          print(f"next_action_command={next_action_command}")

          github_output = str(os.getenv("GITHUB_OUTPUT") or "").strip()
          if github_output:
            output_lines = [
              f"artifact_path={artifact_path}",
              f"status={status}",
              f"phase={phase}",
              f"route={route}",
              f"route_blocking={route_blocking}",
              f"next_action={next_action}",
              f"next_action_command={next_action_command}",
            ]
            with Path(github_output).open("a", encoding="utf-8") as handle:
              handle.write("\n".join(output_lines) + "\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_path = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Knowledge Bootstrap Route",
              "",
              f"- status: `{status}`",
              f"- phase: `{phase}`",
              f"- route: `{route}`",
              f"- route_blocking: `{route_blocking}`",
              f"- next_action: `{next_action}`",
              f"- next_action_command: `{next_action_command}`",
              "",
            ]
            with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Bootstrap follow-up rerun
        if: ${{ steps.route_initial.outputs.route == 'bootstrap' && steps.route_initial.outputs.next_action_command != 'none' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shlex
          import subprocess
          from pathlib import Path

          route_artifact_path = Path("output/ci/knowledge_bootstrap_route.json").resolve()
          if not route_artifact_path.exists():
            raise SystemExit(f"missing_initial_route_artifact:{route_artifact_path}")

          route_payload = json.loads(route_artifact_path.read_text(encoding="utf-8"))
          next_action_command = str(route_payload.get("next_action_command") or "").strip()
          if not next_action_command:
            raise SystemExit("missing_bootstrap_next_action_command")

          print(f"bootstrap_followup_command={next_action_command}")
          subprocess.run(["bash", "-lc", next_action_command], check=True)

          operator_report_path = Path("output/ci/operator_cycle/operator_cycle_report.json").resolve()
          if not operator_report_path.exists():
            raise SystemExit(f"missing_operator_report_after_bootstrap_followup:{operator_report_path}")

          post_route_artifact_path = Path("output/ci/knowledge_bootstrap_route_post_bootstrap.json").resolve()
          subprocess.run(
            [
              "python3",
              "-m",
              "jarvis.cli",
              "improvement",
              "knowledge-bootstrap-route",
              "--report-path",
              str(operator_report_path),
              "--output-path",
              str(post_route_artifact_path),
              "--json-compact",
            ],
            check=True,
          )

          post_payload = json.loads(post_route_artifact_path.read_text(encoding="utf-8"))
          post_status = str(post_payload.get("status") or "warning").strip() or "warning"
          post_phase = str(post_payload.get("phase") or "unknown").strip() or "unknown"
          post_route = str(post_payload.get("route") or "noop").strip() or "noop"
          print(f"bootstrap_followup_status={post_status}")
          print(f"bootstrap_followup_phase={post_phase}")
          print(f"bootstrap_followup_route={post_route}")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_path = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Bootstrap Follow-Up",
              "",
              f"- command: `{next_action_command}`",
              f"- post_status: `{post_status}`",
              f"- post_phase: `{post_phase}`",
              f"- post_route: `{post_route}`",
              "",
            ]
            with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Extract effective knowledge route outputs
        id: route
        run: |
          set -euo pipefail

          POST_ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_post_bootstrap.json"
          INITIAL_ROUTE_ARTIFACT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route.json"
          if [[ -f "${POST_ROUTE_ARTIFACT_PATH}" ]]; then
            ROUTE_ARTIFACT_PATH="${POST_ROUTE_ARTIFACT_PATH}"
            ROUTE_ARTIFACT_SOURCE="post_bootstrap"
          elif [[ -f "${INITIAL_ROUTE_ARTIFACT_PATH}" ]]; then
            ROUTE_ARTIFACT_PATH="${INITIAL_ROUTE_ARTIFACT_PATH}"
            ROUTE_ARTIFACT_SOURCE="initial"
          else
            ROUTE_ARTIFACT_PATH="${INITIAL_ROUTE_ARTIFACT_PATH}"
            ROUTE_ARTIFACT_SOURCE="missing"
          fi

          ROUTE_OUTPUT_PATH="$(pwd)/output/ci/knowledge_bootstrap_route_effective_outputs.json"
          python3 -m jarvis.cli improvement knowledge-bootstrap-route-outputs \
            --artifact-path "${ROUTE_ARTIFACT_PATH}" \
            --artifact-source "${ROUTE_ARTIFACT_SOURCE}" \
            --output-path "${ROUTE_OUTPUT_PATH}" \
            --json-compact > /dev/null

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path("output/ci/knowledge_bootstrap_route_effective_outputs.json").resolve()
          if not output_path.exists():
            raise SystemExit(f"missing_knowledge_bootstrap_route_effective_outputs:{output_path}")

          payload = json.loads(output_path.read_text(encoding="utf-8"))
          if not isinstance(payload, dict):
            raise SystemExit("invalid_knowledge_bootstrap_route_effective_outputs:expected_json_object")

          artifact_path = str(payload.get("artifact_path") or "").strip() or "none"
          artifact_source = str(payload.get("artifact_source") or "unknown").strip() or "unknown"
          status = str(payload.get("status") or "warning").strip() or "warning"
          phase = str(payload.get("phase") or "unknown").strip() or "unknown"
          route = str(payload.get("route") or "noop").strip() or "noop"
          route_blocking = int(payload.get("route_blocking") or 0)
          next_action = str(payload.get("next_action") or "").strip() or "none"
          next_action_command = str(payload.get("next_action_command") or "").strip() or "none"

          print(f"artifact_path={artifact_path}")
          print(f"artifact_source={artifact_source}")
          print(f"status={status}")
          print(f"phase={phase}")
          print(f"route={route}")
          print(f"route_blocking={route_blocking}")
          print(f"next_action={next_action}")
          print(f"next_action_command={next_action_command}")

          github_output = str(os.getenv("GITHUB_OUTPUT") or "").strip()
          if github_output:
            output_lines = [
              f"artifact_path={artifact_path}",
              f"artifact_source={artifact_source}",
              f"status={status}",
              f"phase={phase}",
              f"route={route}",
              f"route_blocking={route_blocking}",
              f"next_action={next_action}",
              f"next_action_command={next_action_command}",
            ]
            with Path(github_output).open("a", encoding="utf-8") as handle:
              handle.write("\n".join(output_lines) + "\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_path = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Knowledge Bootstrap Route (Effective)",
              "",
              f"- artifact_source: `{artifact_source}`",
              f"- status: `{status}`",
              f"- phase: `{phase}`",
              f"- route: `{route}`",
              f"- route_blocking: `{route_blocking}`",
              f"- next_action: `{next_action}`",
              f"- next_action_command: `{next_action_command}`",
              "",
            ]
            with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Warning route branch
        if: ${{ steps.route.outputs.status == 'warning' }}
        run: |
          echo "Knowledge bootstrap routing is unresolved (status=${{ steps.route.outputs.status }}, phase=${{ steps.route.outputs.phase }}, route=${{ steps.route.outputs.route }}). Review route artifact before promoting automated actions."

      - name: Bootstrap route branch
        if: ${{ steps.route.outputs.route == 'bootstrap' }}
        run: |
          echo "Bootstrap route detected. Collect another knowledge snapshot before expecting delta comparisons."

      - name: Run-cycle route branch
        if: ${{ steps.route.outputs.route == 'run_cycle' }}
        run: |
          echo "Knowledge bootstrap is ready. Continue regular operator-cycle cadence."

      - name: No-op route branch
        if: ${{ steps.route.outputs.route == 'noop' }}
        run: |
          echo "Knowledge delta stage not requested or unresolved for this run."

      - name: Verify matrix coverage compact gate
        id: verify_matrix_compact
        run: |
          set -euo pipefail

          REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          COMPACT_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_compact.json"
          COMPACT_MARKDOWN_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_compact.md"

          python3 -m jarvis.cli improvement verify-matrix-compact \
            --report-path "${REPORT_PATH}" \
            --output-path "${COMPACT_PATH}" \
            --markdown-path "${COMPACT_MARKDOWN_PATH}" \
            --json-compact > /dev/null

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def _to_int(value, default=0):
            try:
              return int(float(str(value).strip()))
            except Exception:
              return default

          compact_path = Path("output/ci/operator_cycle/verify_matrix_compact.json").resolve()
          compact_markdown_path = Path("output/ci/operator_cycle/verify_matrix_compact.md").resolve()
          if not compact_path.exists():
            raise SystemExit(f"missing_verify_matrix_compact:{compact_path}")

          compact_payload = json.loads(compact_path.read_text(encoding="utf-8"))
          if not isinstance(compact_payload, dict):
            raise SystemExit("invalid_verify_matrix_compact_payload:expected_json_object")

          domain_statuses = dict(compact_payload.get("domain_statuses") or {})
          operator_ack_bundle = dict(compact_payload.get("operator_ack_bundle") or {})
          suggested_actions = [
            str(item).strip()
            for item in list(compact_payload.get("suggested_actions") or [])
            if str(item).strip()
          ]
          top_scenarios = [
            str(item).strip()
            for item in list(compact_payload.get("top_scenarios") or [])
            if str(item).strip()
          ]
          acknowledge_commands = [
            str(item).strip()
            for item in list(compact_payload.get("acknowledge_commands") or [])
            if str(item).strip()
          ]
          unlock_ready_commands = [
            str(item).strip()
            for item in list(compact_payload.get("unlock_ready_commands") or [])
            if str(item).strip()
          ]
          repair_commands = [
            str(item).strip()
            for item in list(compact_payload.get("repair_commands") or [])
            if str(item).strip()
          ]

          compact_status = str(compact_payload.get("status") or "unknown").strip().lower() or "unknown"
          verify_matrix_status = str(compact_payload.get("verify_matrix_status") or "unknown").strip().lower() or "unknown"
          drift_severity = str(compact_payload.get("drift_severity") or "unknown").strip().lower() or "unknown"
          required_domain_count = _to_int(compact_payload.get("required_domain_count"), default=0)
          covered_domain_count = _to_int(compact_payload.get("covered_domain_count"), default=0)
          missing_domain_count = _to_int(compact_payload.get("missing_domain_count"), default=0)
          missing_domains_csv = str(compact_payload.get("missing_domains_csv") or "none").strip() or "none"
          required_domain_missing_count = _to_int(
            compact_payload.get("required_domain_missing_count"),
            default=missing_domain_count,
          )
          first_missing_domain = str(compact_payload.get("first_missing_domain") or "none").strip() or "none"

          acknowledge_command_count = _to_int(
            compact_payload.get("acknowledge_command_count"),
            default=len(acknowledge_commands),
          )
          first_acknowledge_command = str(compact_payload.get("first_acknowledge_command") or "").strip()
          if not first_acknowledge_command:
            first_acknowledge_command = acknowledge_commands[0] if acknowledge_commands else "none"

          recheck_command = str(compact_payload.get("recheck_command") or "").strip()
          if not recheck_command:
            recheck_command = unlock_ready_commands[0] if unlock_ready_commands else "none"

          first_unlock_ready_command = str(compact_payload.get("first_unlock_ready_command") or "").strip()
          if not first_unlock_ready_command:
            first_unlock_ready_command = unlock_ready_commands[0] if unlock_ready_commands else "none"

          repair_command_count = _to_int(
            compact_payload.get("repair_command_count"),
            default=len(repair_commands),
          )
          first_repair_command = str(compact_payload.get("first_repair_command") or "").strip()
          if not first_repair_command:
            first_repair_command = repair_commands[0] if repair_commands else "none"

          repair_command_sequence = str(
            compact_payload.get("repair_command_sequence")
            or operator_ack_bundle.get("command_sequence")
            or "none"
          ).strip() or "none"

          suggested_action_count = _to_int(
            compact_payload.get("suggested_action_count"),
            default=len(suggested_actions),
          )
          first_suggested_action = str(compact_payload.get("first_suggested_action") or "").strip()
          if not first_suggested_action:
            first_suggested_action = suggested_actions[0] if suggested_actions else "none"

          top_scenario_count = _to_int(
            compact_payload.get("top_scenario_count"),
            default=len(top_scenarios),
          )
          first_top_scenario = str(compact_payload.get("first_top_scenario") or "").strip()
          if not first_top_scenario:
            first_top_scenario = top_scenarios[0] if top_scenarios else "none"

          compact_markdown_path_from_payload = Path(
            str(compact_payload.get("verify_matrix_compact_markdown_path") or compact_markdown_path)
          ).expanduser().resolve()
          compact_path_from_payload = Path(
            str(compact_payload.get("verify_matrix_compact_path") or compact_path)
          ).expanduser().resolve()

          print(f"verify_matrix_compact_path={compact_path_from_payload}")
          print(f"verify_matrix_compact_markdown_path={compact_markdown_path_from_payload}")
          print(f"verify_matrix_compact_status={compact_status}")
          print(f"verify_matrix_status={verify_matrix_status}")
          print(f"verify_matrix_drift_severity={drift_severity}")
          print(f"drift_severity={drift_severity}")
          print(f"required_domain_count={required_domain_count}")
          print(f"covered_domain_count={covered_domain_count}")
          print(f"missing_domain_count={missing_domain_count}")
          print(f"missing_domains_csv={missing_domains_csv}")
          print(f"verify_matrix_required_domain_missing_count={required_domain_missing_count}")
          print(f"verify_matrix_first_missing_domain={first_missing_domain}")
          print(f"acknowledge_command_count={acknowledge_command_count}")
          print(f"first_acknowledge_command={first_acknowledge_command}")
          print(f"verify_matrix_recheck_command={recheck_command}")
          print(f"verify_matrix_first_unlock_ready_command={first_unlock_ready_command}")
          print(f"first_unlock_ready_command={first_unlock_ready_command}")
          print(f"recheck_command={recheck_command}")
          print(f"repair_command_count={repair_command_count}")
          print(f"first_repair_command={first_repair_command}")
          print(f"operator_ack_bundle_command_sequence={repair_command_sequence}")
          print(f"suggested_action_count={suggested_action_count}")
          print(f"first_suggested_action={first_suggested_action}")
          print(f"top_scenario_count={top_scenario_count}")
          print(f"first_top_scenario={first_top_scenario}")

          github_output = str(os.getenv("GITHUB_OUTPUT") or "").strip()
          if github_output:
            output_lines = [
              f"verify_matrix_compact_path={compact_path_from_payload}",
              f"verify_matrix_compact_markdown_path={compact_markdown_path_from_payload}",
              f"verify_matrix_compact_status={compact_status}",
              f"verify_matrix_status={verify_matrix_status}",
              f"verify_matrix_drift_severity={drift_severity}",
              f"drift_severity={drift_severity}",
              f"required_domain_count={required_domain_count}",
              f"covered_domain_count={covered_domain_count}",
              f"missing_domain_count={missing_domain_count}",
              f"missing_domains_csv={missing_domains_csv}",
              f"verify_matrix_required_domain_missing_count={required_domain_missing_count}",
              f"verify_matrix_first_missing_domain={first_missing_domain}",
              f"acknowledge_command_count={acknowledge_command_count}",
              f"first_acknowledge_command={first_acknowledge_command}",
              f"verify_matrix_recheck_command={recheck_command}",
              f"verify_matrix_first_unlock_ready_command={first_unlock_ready_command}",
              f"first_unlock_ready_command={first_unlock_ready_command}",
              f"recheck_command={recheck_command}",
              f"repair_command_count={repair_command_count}",
              f"first_repair_command={first_repair_command}",
              f"operator_ack_bundle_command_sequence={repair_command_sequence}",
              f"suggested_action_count={suggested_action_count}",
              f"first_suggested_action={first_suggested_action}",
              f"top_scenario_count={top_scenario_count}",
              f"first_top_scenario={first_top_scenario}",
            ]
            with Path(github_output).open("a", encoding="utf-8") as handle:
              handle.write("\n".join(output_lines) + "\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_path = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Verify Matrix Compact Coverage",
              "",
              f"- status: `{compact_status}`",
              f"- verify_matrix_status: `{verify_matrix_status}`",
              f"- drift_severity: `{drift_severity}`",
              f"- missing_domain_count: `{missing_domain_count}`",
              f"- missing_domains_csv: `{missing_domains_csv}`",
              f"- first_unlock_ready_command: `{first_unlock_ready_command}`",
              "",
            ]
            if compact_markdown_path_from_payload.exists():
              markdown_text = compact_markdown_path_from_payload.read_text(encoding="utf-8").strip()
              if markdown_text:
                summary_lines.append(markdown_text)
                summary_lines.append("")
            with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Open verify matrix coverage interrupt alert
        if: ${{ steps.verify_matrix_compact.outputs.missing_domain_count != '0' }}
        id: verify_matrix_coverage_alert
        env:
          VERIFY_MATRIX_COMPACT_PATH: ${{ steps.verify_matrix_compact.outputs.verify_matrix_compact_path }}
          VERIFY_MATRIX_COMPACT_STATUS: ${{ steps.verify_matrix_compact.outputs.verify_matrix_compact_status }}
          MISSING_DOMAIN_COUNT: ${{ steps.verify_matrix_compact.outputs.missing_domain_count }}
          MISSING_DOMAINS_CSV: ${{ steps.verify_matrix_compact.outputs.missing_domains_csv }}
          FIRST_MISSING_DOMAIN: ${{ steps.verify_matrix_compact.outputs.verify_matrix_first_missing_domain }}
          VERIFY_MATRIX_RECHECK_COMMAND: ${{ steps.verify_matrix_compact.outputs.verify_matrix_recheck_command }}
          VERIFY_MATRIX_FIRST_UNLOCK_READY_COMMAND: ${{ steps.verify_matrix_compact.outputs.verify_matrix_first_unlock_ready_command }}
        run: |
          set -euo pipefail

          COMPACT_PATH="${VERIFY_MATRIX_COMPACT_PATH:-$(pwd)/output/ci/operator_cycle/verify_matrix_compact.json}"
          ALERT_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_coverage_alert.json"
          DB_PATH="$(pwd)/output/ci/operator_cycle/jarvis.db"

          # Runtime emits memory event: improvement.verify_matrix_coverage_alert_created
          python3 -m jarvis.cli improvement verify-matrix-coverage-alert \
            --compact-path "${COMPACT_PATH}" \
            --output-path "${ALERT_PATH}" \
            --missing-domain-count "${MISSING_DOMAIN_COUNT}" \
            --missing-domains-csv "${MISSING_DOMAINS_CSV}" \
            --first-missing-domain "${FIRST_MISSING_DOMAIN}" \
            --compact-status "${VERIFY_MATRIX_COMPACT_STATUS}" \
            --recheck-command "${VERIFY_MATRIX_RECHECK_COMMAND}" \
            --first-unlock-ready-command "${VERIFY_MATRIX_FIRST_UNLOCK_READY_COMMAND}" \
            --repo-path "$(pwd)" \
            --db-path "${DB_PATH}" \
            --json-compact > /dev/null

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def _to_int(value, default=0):
            try:
              return int(float(str(value).strip()))
            except Exception:
              return default

          alert_path = Path("output/ci/operator_cycle/verify_matrix_coverage_alert.json").resolve()
          if not alert_path.exists():
            raise SystemExit(f"missing_verify_matrix_coverage_alert:{alert_path}")

          payload = json.loads(alert_path.read_text(encoding="utf-8"))
          if not isinstance(payload, dict):
            raise SystemExit("invalid_verify_matrix_coverage_alert_payload:expected_json_object")

          interrupt_id = str(payload.get("interrupt_id") or "").strip() or "none"
          alert_created = bool(payload.get("alert_created"))
          acknowledge_command = str(payload.get("acknowledge_command") or "").strip() or "none"
          recheck_command = str(payload.get("recheck_command") or "").strip() or "none"
          first_repair_command = str(payload.get("first_repair_command") or "").strip()
          if not first_repair_command:
            first_repair_command = acknowledge_command if acknowledge_command != "none" else recheck_command
          first_repair_command = first_repair_command or "none"
          runtime_error = str(payload.get("runtime_error") or "").strip() or "none"
          missing_domain_count = _to_int(payload.get("missing_domain_count"), default=0)
          first_missing_domain = str(payload.get("first_missing_domain") or "none").strip() or "none"
          missing_domains_csv = str(payload.get("missing_domains_csv") or "none").strip() or "none"

          print(f"verify_matrix_coverage_alert_path={alert_path}")
          print(f"verify_matrix_coverage_interrupt_id={interrupt_id}")
          print(f"verify_matrix_coverage_alert_created={1 if alert_created else 0}")
          print(f"verify_matrix_coverage_acknowledge_command={acknowledge_command}")
          print(f"verify_matrix_coverage_recheck_command={recheck_command}")
          print(f"verify_matrix_coverage_first_repair_command={first_repair_command}")
          print(f"verify_matrix_coverage_runtime_error={runtime_error}")

          github_output = str(os.getenv("GITHUB_OUTPUT") or "").strip()
          if github_output:
            output_lines = [
              f"verify_matrix_coverage_alert_path={alert_path}",
              f"verify_matrix_coverage_interrupt_id={interrupt_id}",
              f"verify_matrix_coverage_alert_created={1 if alert_created else 0}",
              f"verify_matrix_coverage_acknowledge_command={acknowledge_command}",
              f"verify_matrix_coverage_recheck_command={recheck_command}",
              f"verify_matrix_coverage_first_repair_command={first_repair_command}",
              f"verify_matrix_coverage_runtime_error={runtime_error}",
            ]
            with Path(github_output).open("a", encoding="utf-8") as handle:
              handle.write("\n".join(output_lines) + "\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_output = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Verify Matrix Coverage Interrupt Alert",
              "",
              f"- interrupt_id: `{interrupt_id}`",
              f"- alert_created: `{1 if alert_created else 0}`",
              f"- missing_domain_count: `{missing_domain_count}`",
              f"- first_missing_domain: `{first_missing_domain}`",
              f"- missing_domains_csv: `{missing_domains_csv}`",
              f"- acknowledge_command: `{acknowledge_command}`",
              f"- recheck_command: `{recheck_command}`",
              f"- first_repair_command: `{first_repair_command}`",
              f"- runtime_error: `{runtime_error}`",
              "",
            ]
            with summary_output.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Fail on verify matrix coverage gaps
        if: ${{ steps.verify_matrix_compact.outputs.missing_domain_count != '0' }}
        run: |
          echo "Verify matrix coverage is missing required domains (count=${{ steps.verify_matrix_compact.outputs.missing_domain_count }}, first=${{ steps.verify_matrix_compact.outputs.verify_matrix_first_missing_domain }}, domains=${{ steps.verify_matrix_compact.outputs.missing_domains_csv }}, interrupt_id=${{ steps.verify_matrix_coverage_alert.outputs.verify_matrix_coverage_interrupt_id }}, first_repair=${{ steps.verify_matrix_coverage_alert.outputs.verify_matrix_coverage_first_repair_command }})."
          exit 1

      - name: Guardrail gate
        run: |
          set -euo pipefail

          REPORT_PATH="$(pwd)/output/ci/operator_cycle/operator_cycle_report.json"
          GATE_PATH="$(pwd)/output/ci/operator_cycle/verify_matrix_guardrail_gate.json"

          python3 -m jarvis.cli improvement verify-matrix-guardrail-gate \
            --report-path "${REPORT_PATH}" \
            --output-path "${GATE_PATH}" \
            --json-compact > /dev/null

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def _to_int(value, default=0):
            try:
              return int(float(str(value).strip()))
            except Exception:
              return default

          gate_path = Path("output/ci/operator_cycle/verify_matrix_guardrail_gate.json").resolve()
          if not gate_path.exists():
            raise SystemExit(f"missing_verify_matrix_guardrail_gate:{gate_path}")

          payload = json.loads(gate_path.read_text(encoding="utf-8"))
          if not isinstance(payload, dict):
            raise SystemExit("invalid_verify_matrix_guardrail_gate_payload:expected_json_object")

          report_path = str(payload.get("guardrail_gate_report") or payload.get("report_path") or "").strip() or str(gate_path)
          operator_status = str(payload.get("guardrail_gate_operator_status") or payload.get("operator_status") or "unknown").strip().lower() or "unknown"
          stage_error_count = _to_int(
            payload.get("guardrail_gate_stage_error_count")
            if payload.get("guardrail_gate_stage_error_count") is not None
            else payload.get("stage_error_count"),
            default=0,
          )
          verify_matrix_status = str(
            payload.get("guardrail_gate_verify_matrix_status")
            if payload.get("guardrail_gate_verify_matrix_status") is not None
            else payload.get("verify_matrix_status")
            or "unknown"
          ).strip().lower() or "unknown"

          print(f"guardrail_gate_report={report_path}")
          print(f"guardrail_gate_operator_status={operator_status}")
          print(f"guardrail_gate_stage_error_count={stage_error_count}")
          print(f"guardrail_gate_verify_matrix_status={verify_matrix_status}")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_path = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Operator Guardrail Gate",
              "",
              f"- operator_status: `{operator_status}`",
              f"- stage_error_count: `{stage_error_count}`",
              f"- verify_matrix_status: `{verify_matrix_status}`",
              "",
            ]
            with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")

          failure_reason = str(payload.get("failure_reason") or "").strip()
          if not failure_reason:
            if stage_error_count > 0:
              failure_reason = (
                "operator_guardrail_gate_failed:stage_error_count>0 "
                f"(count={stage_error_count})"
              )
            elif verify_matrix_status != "ok":
              failure_reason = (
                "operator_guardrail_gate_failed:verify_matrix_status_not_ok "
                f"(status={verify_matrix_status})"
              )

          if failure_reason:
            raise SystemExit(failure_reason)
          PY

      - name: Collect debug trace artifacts
        if: always()
        run: |
          mkdir -p output/ci
          if [[ -d configs/improvement_operator_knowledge_stack/output/debug_runs ]]; then
            cp -R configs/improvement_operator_knowledge_stack/output/debug_runs output/ci/debug_runs
          fi
          if [[ -d analysis/improvement/knowledge_snapshots ]]; then
            cp -R analysis/improvement/knowledge_snapshots output/ci/knowledge_snapshots
          fi

      - name: Upload route artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: knowledge-bootstrap-route
          path: output/ci/

      - name: Fail workflow on warning status
        if: ${{ steps.route.outputs.route_blocking == '1' }}
        run: |
          echo "Knowledge route is blocking (status=${{ steps.route.outputs.status }}, phase=${{ steps.route.outputs.phase }}, route=${{ steps.route.outputs.route }})."
          exit 1
