name: improvement-domain-smoke-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "40 3 * * 1-5"

jobs:
  domain-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        domain:
          - quant_finance
          - kalshi_weather
          - fitness_apps
          - market_ml
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run domain smoke loop
        run: |
          mkdir -p "output/ci/domain_smoke/${{ matrix.domain }}"
          ./scripts/run_improvement_domain_smoke.sh \
            ./configs/improvement_operator_knowledge_stack.json \
            "${{ matrix.domain }}" \
            --output-dir "output/ci/domain_smoke/${{ matrix.domain }}" \
            --allow-missing

      - name: Extract domain smoke outputs
        id: smoke
        env:
          MATRIX_DOMAIN: ${{ matrix.domain }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          domain = str(os.getenv("MATRIX_DOMAIN") or "unknown").strip().lower() or "unknown"
          summary_path = Path(f"output/ci/domain_smoke/{domain}/{domain}_smoke_summary.json").resolve()
          if summary_path.exists():
            payload = json.loads(summary_path.read_text(encoding="utf-8"))
          else:
            payload = {
              "status": "warning",
              "domain": domain,
              "reason": "domain_smoke_summary_missing",
              "pull_report_path": None,
              "leaderboard_report_path": None,
              "seed_report_path": None,
            }

          status = str(payload.get("status") or "warning").strip().lower() or "warning"
          reported_domain = str(payload.get("domain") or "").strip().lower()
          pull_report_path = str(payload.get("pull_report_path") or "none").strip() or "none"
          leaderboard_report_path = str(payload.get("leaderboard_report_path") or "none").strip() or "none"
          seed_report_path = str(payload.get("seed_report_path") or "none").strip() or "none"

          reason = "none"
          smoke_blocking = 0
          if not summary_path.exists():
            status = "warning"
            reason = "domain_smoke_summary_missing"
            smoke_blocking = 1
          elif not reported_domain:
            status = "warning"
            reason = "domain_smoke_domain_missing"
            smoke_blocking = 1
          elif reported_domain != domain:
            status = "warning"
            reason = f"domain_smoke_domain_mismatch:{reported_domain}"
            smoke_blocking = 1
          elif status != "ok":
            reason = f"domain_smoke_status_not_ok:{status}"
            smoke_blocking = 1

          print(f"domain={domain}")
          print(f"summary_path={summary_path}")
          print(f"status={status}")
          print(f"reported_domain={reported_domain or 'none'}")
          print(f"reason={reason}")
          print(f"smoke_blocking={smoke_blocking}")
          print(f"pull_report_path={pull_report_path}")
          print(f"leaderboard_report_path={leaderboard_report_path}")
          print(f"seed_report_path={seed_report_path}")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
            handle.write(f"domain={domain}\n")
            handle.write(f"summary_path={summary_path}\n")
            handle.write(f"status={status}\n")
            handle.write(f"reported_domain={reported_domain or 'none'}\n")
            handle.write(f"reason={reason}\n")
            handle.write(f"smoke_blocking={smoke_blocking}\n")
            handle.write(f"pull_report_path={pull_report_path}\n")
            handle.write(f"leaderboard_report_path={leaderboard_report_path}\n")
            handle.write(f"seed_report_path={seed_report_path}\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_output = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Domain Smoke",
              "",
              f"- domain: `{domain}`",
              f"- status: `{status}`",
              f"- reason: `{reason}`",
              f"- summary_path: `{summary_path}`",
              f"- pull_report_path: `{pull_report_path}`",
              f"- leaderboard_report_path: `{leaderboard_report_path}`",
              f"- seed_report_path: `{seed_report_path}`",
              "",
            ]
            with summary_output.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Warning smoke branch
        if: ${{ steps.smoke.outputs.smoke_blocking == '1' }}
        run: |
          echo "Domain smoke run requires attention (domain=${{ steps.smoke.outputs.domain }}, status=${{ steps.smoke.outputs.status }}, reason=${{ steps.smoke.outputs.reason }})."

      - name: Healthy smoke branch
        if: ${{ steps.smoke.outputs.smoke_blocking == '0' }}
        run: |
          echo "Domain smoke run healthy (domain=${{ steps.smoke.outputs.domain }}, status=${{ steps.smoke.outputs.status }})."

      - name: Open domain smoke interrupt alert
        if: ${{ steps.smoke.outputs.smoke_blocking == '1' }}
        id: smoke_alert
        env:
          MATRIX_DOMAIN: ${{ matrix.domain }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.status }}
          SMOKE_REASON: ${{ steps.smoke.outputs.reason }}
          SUMMARY_PATH: ${{ steps.smoke.outputs.summary_path }}
          PULL_REPORT_PATH: ${{ steps.smoke.outputs.pull_report_path }}
          LEADERBOARD_REPORT_PATH: ${{ steps.smoke.outputs.leaderboard_report_path }}
          SEED_REPORT_PATH: ${{ steps.smoke.outputs.seed_report_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from jarvis.ids import new_id
          from jarvis.interrupts import InterruptDecision
          from jarvis.runtime import JarvisRuntime

          domain = str(os.getenv("MATRIX_DOMAIN") or "unknown").strip().lower() or "unknown"
          smoke_status = str(os.getenv("SMOKE_STATUS") or "warning").strip().lower() or "warning"
          smoke_reason = str(os.getenv("SMOKE_REASON") or "domain_smoke_failure").strip() or "domain_smoke_failure"
          summary_path = Path(str(os.getenv("SUMMARY_PATH") or "")).expanduser()
          pull_report_path = str(os.getenv("PULL_REPORT_PATH") or "none").strip() or "none"
          leaderboard_report_path = str(os.getenv("LEADERBOARD_REPORT_PATH") or "none").strip() or "none"
          seed_report_path = str(os.getenv("SEED_REPORT_PATH") or "none").strip() or "none"

          alert_path = Path(f"output/ci/domain_smoke/{domain}/{domain}_smoke_alert.json").resolve()
          alert_path.parent.mkdir(parents=True, exist_ok=True)
          db_path = (alert_path.parent / "jarvis.db").resolve()

          rerun_command = (
            "./scripts/run_improvement_domain_smoke.sh "
            "./configs/improvement_operator_knowledge_stack.json "
            f"{domain} --output-dir output/ci/domain_smoke/{domain} --allow-missing"
          )
          why_now = (
            f"domain smoke validation failed for {domain} "
            f"(status={smoke_status}, reason={smoke_reason}) and requires immediate operator triage."
          )
          why_not_later = (
            "untriaged smoke failures can hide degraded signal ingestion and seed quality "
            "before controlled experiments start."
          )

          interrupt_id = ""
          acknowledge_command = "none"
          runtime_error = "none"
          runtime = None
          try:
            runtime = JarvisRuntime(
              db_path=db_path,
              repo_path=Path.cwd(),
            )
            decision = InterruptDecision(
              interrupt_id=new_id("int"),
              candidate_id=new_id("cand"),
              domain=domain,
              reason=(
                "domain_smoke_failure"
                f" status={smoke_status}"
                f" reason={smoke_reason}"
              ),
              urgency_score=0.93,
              confidence=0.9,
              suppression_window_hit=False,
              delivered=True,
              why_now=why_now,
              why_not_later=why_not_later,
              status="delivered",
            )
            runtime.interrupt_store.store(decision)
            interrupt = runtime.interrupt_store.get(decision.interrupt_id) or decision.to_dict()
            interrupt_id = str(interrupt.get("interrupt_id") or "").strip()
            if interrupt_id:
              acknowledge_command = (
                "python3 -m jarvis.cli interrupts acknowledge "
                f"{interrupt_id} --actor operator --db-path {db_path}"
              )
            runtime.memory.append_event(
              "improvement.domain_smoke_alert_created",
              {
                "interrupt_id": interrupt_id or None,
                "domain": domain,
                "status": smoke_status,
                "reason": smoke_reason,
                "summary_path": str(summary_path.resolve()) if summary_path.exists() else str(summary_path),
                "pull_report_path": pull_report_path,
                "leaderboard_report_path": leaderboard_report_path,
                "seed_report_path": seed_report_path,
                "rerun_command": rerun_command,
              },
            )
          except Exception as exc:  # pragma: no cover - workflow inline guard
            runtime_error = str(exc).strip() or "unknown_runtime_error"
          finally:
            if runtime is not None:
              runtime.close()

          payload = {
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "status": "warning",
            "domain": domain,
            "smoke_status": smoke_status,
            "smoke_reason": smoke_reason,
            "summary_path": str(summary_path.resolve()) if summary_path.exists() else str(summary_path),
            "pull_report_path": pull_report_path,
            "leaderboard_report_path": leaderboard_report_path,
            "seed_report_path": seed_report_path,
            "alert_created": bool(interrupt_id),
            "interrupt_id": interrupt_id or None,
            "interrupt_db_path": str(db_path),
            "acknowledge_command": None if acknowledge_command == "none" else acknowledge_command,
            "rerun_command": rerun_command,
            "why_now": why_now,
            "why_not_later": why_not_later,
            "runtime_error": None if runtime_error == "none" else runtime_error,
          }
          alert_path.write_text(json.dumps(payload, indent=2), encoding="utf-8")

          print(f"alert_path={alert_path}")
          print(f"interrupt_id={interrupt_id or 'none'}")
          print(f"alert_created={1 if interrupt_id else 0}")
          print(f"acknowledge_command={acknowledge_command}")
          print(f"rerun_command={rerun_command}")
          print(f"runtime_error={runtime_error}")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
            handle.write(f"alert_path={alert_path}\n")
            handle.write(f"interrupt_id={interrupt_id or 'none'}\n")
            handle.write(f"alert_created={1 if interrupt_id else 0}\n")
            handle.write(f"acknowledge_command={acknowledge_command}\n")
            handle.write(f"rerun_command={rerun_command}\n")
            handle.write(f"runtime_error={runtime_error}\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_output = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Domain Smoke Interrupt Alert",
              "",
              f"- domain: `{domain}`",
              f"- interrupt_id: `{interrupt_id or 'none'}`",
              f"- alert_created: `{1 if interrupt_id else 0}`",
              f"- smoke_status: `{smoke_status}`",
              f"- smoke_reason: `{smoke_reason}`",
              f"- rerun_command: `{rerun_command}`",
              f"- acknowledge_command: `{acknowledge_command}`",
              f"- runtime_error: `{runtime_error}`",
              "",
            ]
            with summary_output.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Collect debug trace artifacts
        if: always()
        run: |
          domain_dir="output/ci/domain_smoke/${{ matrix.domain }}"
          mkdir -p "${domain_dir}"
          if [[ -d configs/improvement_operator_knowledge_stack/output/debug_runs ]]; then
            cp -R configs/improvement_operator_knowledge_stack/output/debug_runs "${domain_dir}/debug_runs"
          fi
          if [[ -d analysis/improvement/knowledge_snapshots ]]; then
            cp -R analysis/improvement/knowledge_snapshots "${domain_dir}/knowledge_snapshots"
          fi

      - name: Upload domain smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: domain-smoke-${{ matrix.domain }}
          path: output/ci/domain_smoke/${{ matrix.domain }}/

      - name: Fail workflow on warning status
        if: ${{ steps.smoke.outputs.smoke_blocking == '1' }}
        run: |
          echo "Domain smoke blocking status detected (domain=${{ steps.smoke.outputs.domain }}, reason=${{ steps.smoke.outputs.reason }}, interrupt_id=${{ steps.smoke_alert.outputs.interrupt_id }}, rerun=${{ steps.smoke_alert.outputs.rerun_command }})."
          exit 1

  domain-smoke-aggregate:
    if: always()
    needs:
      - domain-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Download domain smoke artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: domain-smoke-*
          path: output/ci/domain_smoke_artifacts

      - name: Build cross-domain smoke summary
        id: aggregate
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          artifacts_root = Path("output/ci/domain_smoke_artifacts").resolve()
          summary_output_path = Path("output/ci/domain_smoke/domain_smoke_cross_domain_summary.json").resolve()
          summary_markdown_path = Path("output/ci/domain_smoke/domain_smoke_cross_domain_summary.md").resolve()
          summary_output_path.parent.mkdir(parents=True, exist_ok=True)

          def _load_json(path: Path) -> dict:
            try:
              payload = json.loads(path.read_text(encoding="utf-8"))
            except Exception:
              return {}
            return payload if isinstance(payload, dict) else {}

          summary_files = sorted(artifacts_root.glob("**/*_smoke_summary.json"))
          alert_files = sorted(artifacts_root.glob("**/*_smoke_alert.json"))
          artifact_dirs = sorted(
            path
            for path in artifacts_root.glob("domain-smoke-*")
            if path.is_dir()
          )

          summary_by_domain: dict[str, dict] = {}
          for path in summary_files:
            payload = _load_json(path)
            domain = str(payload.get("domain") or "").strip().lower()
            if not domain:
              domain = path.name.replace("_smoke_summary.json", "").strip().lower()
            if not domain:
              continue
            summary_by_domain[domain] = payload

          alert_by_domain: dict[str, dict] = {}
          for path in alert_files:
            payload = _load_json(path)
            domain = str(payload.get("domain") or "").strip().lower()
            if not domain:
              domain = path.name.replace("_smoke_alert.json", "").strip().lower()
            if not domain:
              continue
            alert_by_domain[domain] = payload

          domains = set(summary_by_domain) | set(alert_by_domain)
          for path in artifact_dirs:
            suffix = path.name.removeprefix("domain-smoke-").strip().lower()
            if suffix:
              domains.add(suffix)

          rows: list[dict] = []
          for domain in sorted(domains):
            summary_payload = dict(summary_by_domain.get(domain) or {})
            alert_payload = dict(alert_by_domain.get(domain) or {})
            smoke_status = str(summary_payload.get("status") or "warning").strip().lower() or "warning"
            smoke_reason = (
              str(alert_payload.get("smoke_reason") or "").strip()
              or str(summary_payload.get("reason") or "").strip()
              or ("none" if smoke_status == "ok" else f"domain_smoke_status_not_ok:{smoke_status}")
            )
            alert_created = bool(alert_payload.get("alert_created"))
            interrupt_id = str(alert_payload.get("interrupt_id") or "").strip()
            acknowledge_command = str(alert_payload.get("acknowledge_command") or "").strip()
            rerun_command = str(alert_payload.get("rerun_command") or "").strip()
            runtime_error = str(alert_payload.get("runtime_error") or "").strip()

            risk_score = 0
            if smoke_status != "ok":
              risk_score += 70
            if alert_created:
              risk_score += 20
            if interrupt_id:
              risk_score += 5
            if runtime_error and runtime_error.lower() != "none":
              risk_score += 8
            if "missing" in smoke_reason:
              risk_score += 5
            if "mismatch" in smoke_reason:
              risk_score += 4

            if risk_score >= 90:
              risk_tier = "critical"
            elif risk_score >= 60:
              risk_tier = "warn"
            else:
              risk_tier = "ok"

            rows.append(
              {
                "domain": domain,
                "smoke_status": smoke_status,
                "smoke_reason": smoke_reason,
                "smoke_blocking": 1 if smoke_status != "ok" else 0,
                "risk_score": int(risk_score),
                "risk_tier": risk_tier,
                "alert_created": alert_created,
                "interrupt_id": interrupt_id or None,
                "acknowledge_command": acknowledge_command or None,
                "rerun_command": rerun_command or None,
                "runtime_error": runtime_error or None,
                "has_summary_artifact": domain in summary_by_domain,
                "has_alert_artifact": domain in alert_by_domain,
                "summary_path": summary_payload.get("summary_path"),
                "alert_path": alert_payload.get("alert_path"),
              }
            )

          rows.sort(key=lambda item: (-int(item.get("risk_score") or 0), str(item.get("domain") or "")))
          warning_count = sum(1 for row in rows if str(row.get("smoke_status") or "") != "ok")
          ok_count = sum(1 for row in rows if str(row.get("smoke_status") or "") == "ok")
          blocking_count = sum(int(row.get("smoke_blocking") or 0) for row in rows)
          alerts_created_count = sum(1 for row in rows if bool(row.get("alert_created")))
          top_risks = [row for row in rows if int(row.get("risk_score") or 0) > 0][:4]
          missing_summary_domains = [
            str(row.get("domain") or "")
            for row in rows
            if not bool(row.get("has_summary_artifact"))
          ]
          missing_alert_domains = [
            str(row.get("domain") or "")
            for row in rows
            if int(row.get("smoke_blocking") or 0) > 0 and not bool(row.get("has_alert_artifact"))
          ]
          summary_status = "ok" if warning_count == 0 else "warning"
          if not rows:
            summary_status = "warning"

          suggested_actions: list[str] = []
          for row in top_risks[:3]:
            domain = str(row.get("domain") or "unknown")
            rerun_command = str(row.get("rerun_command") or "").strip()
            acknowledge_command = str(row.get("acknowledge_command") or "").strip()
            if rerun_command:
              suggested_actions.append(f"[{domain}] rerun smoke loop: {rerun_command}")
            if acknowledge_command:
              suggested_actions.append(f"[{domain}] acknowledge interrupt: {acknowledge_command}")
          if not suggested_actions and rows:
            suggested_actions.append("No blocking cross-domain smoke risk detected; continue scheduled cadence.")
          if not rows:
            suggested_actions.append("No domain smoke artifacts found; verify upstream matrix artifact upload.")

          payload = {
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "status": summary_status,
            "artifact_root": str(artifacts_root),
            "domain_count": len(rows),
            "summary_file_count": len(summary_files),
            "alert_file_count": len(alert_files),
            "ok_count": ok_count,
            "warning_count": warning_count,
            "blocking_count": blocking_count,
            "alerts_created_count": alerts_created_count,
            "missing_summary_domains": missing_summary_domains,
            "missing_alert_domains": missing_alert_domains,
            "top_risks": top_risks,
            "domains": rows,
            "suggested_actions": suggested_actions,
          }

          summary_output_path.write_text(json.dumps(payload, indent=2), encoding="utf-8")

          markdown_lines = [
            "# Domain Smoke Cross-Domain Summary",
            "",
            f"- status: `{summary_status}`",
            f"- domain_count: `{len(rows)}`",
            f"- warning_count: `{warning_count}`",
            f"- blocking_count: `{blocking_count}`",
            f"- alerts_created_count: `{alerts_created_count}`",
            "",
            "## Top Risks",
            "",
          ]
          if top_risks:
            for row in top_risks:
              markdown_lines.extend(
                [
                  f"- `{row.get('domain')}` risk_score={row.get('risk_score')} status={row.get('smoke_status')} reason={row.get('smoke_reason')}",
                  f"  - rerun_command: `{row.get('rerun_command') or 'none'}`",
                  f"  - acknowledge_command: `{row.get('acknowledge_command') or 'none'}`",
                ]
              )
          else:
            markdown_lines.append("- none")
          markdown_lines.extend(["", "## Suggested Actions", ""])
          for action in suggested_actions:
            markdown_lines.append(f"- {action}")
          summary_markdown_path.write_text("\n".join(markdown_lines) + "\n", encoding="utf-8")

          top_domain = str((top_risks[0] or {}).get("domain") or "none") if top_risks else "none"
          top_risk_score = int((top_risks[0] or {}).get("risk_score") or 0) if top_risks else 0
          print(f"summary_path={summary_output_path}")
          print(f"summary_markdown_path={summary_markdown_path}")
          print(f"cross_domain_status={summary_status}")
          print(f"domain_count={len(rows)}")
          print(f"warning_count={warning_count}")
          print(f"blocking_count={blocking_count}")
          print(f"alerts_created_count={alerts_created_count}")
          print(f"top_domain={top_domain}")
          print(f"top_risk_score={top_risk_score}")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
            handle.write(f"summary_path={summary_output_path}\n")
            handle.write(f"summary_markdown_path={summary_markdown_path}\n")
            handle.write(f"cross_domain_status={summary_status}\n")
            handle.write(f"domain_count={len(rows)}\n")
            handle.write(f"warning_count={warning_count}\n")
            handle.write(f"blocking_count={blocking_count}\n")
            handle.write(f"alerts_created_count={alerts_created_count}\n")
            handle.write(f"top_domain={top_domain}\n")
            handle.write(f"top_risk_score={top_risk_score}\n")

          github_step_summary = str(os.getenv("GITHUB_STEP_SUMMARY") or "").strip()
          if github_step_summary:
            summary_output = Path(github_step_summary).expanduser()
            summary_lines = [
              "## Domain Smoke Cross-Domain Summary",
              "",
              f"- status: `{summary_status}`",
              f"- domain_count: `{len(rows)}`",
              f"- warning_count: `{warning_count}`",
              f"- blocking_count: `{blocking_count}`",
              f"- alerts_created_count: `{alerts_created_count}`",
              f"- top_domain: `{top_domain}`",
              f"- top_risk_score: `{top_risk_score}`",
              f"- summary_path: `{summary_output_path}`",
              "",
            ]
            with summary_output.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(summary_lines) + "\n")
          PY

      - name: Upload cross-domain smoke summary artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: domain-smoke-cross-domain-summary
          path: |
            output/ci/domain_smoke/domain_smoke_cross_domain_summary.json
            output/ci/domain_smoke/domain_smoke_cross_domain_summary.md
