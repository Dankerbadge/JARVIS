name: backfill-signals-quiet-template

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"

jobs:
  backfill-quiet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run quiet backfill monitor + export warning audit
        env:
          JARVIS_REPO_PATH: ${{ github.workspace }}
          JARVIS_DB_PATH: ${{ github.workspace }}/.jarvis/jarvis.db
          # Optional: audit payload profile ("full" or "minimal").
          BACKFILL_AUDIT_EXPORT_PROFILE: "minimal"
          # Optional minimal-profile tuning for high-frequency lanes.
          BACKFILL_AUDIT_MIN_WARNING_CODE_LIMIT: "8"
          BACKFILL_AUDIT_MIN_OMIT_SIGNAL_SUMMARY: "false"
          BACKFILL_AUDIT_MIN_OMIT_POLICY_DRIFT_DIFFERENCES: "true"
          # Optional drift reporting profile ("full" or "policy_core").
          BACKFILL_POLICY_DRIFT_PROJECTION_PROFILE: "policy_core"
          # Optional: fail when policy-core contract drifts vs baseline.
          BACKFILL_ENFORCE_STABLE_POLICY_CORE: "false"
          # Optional bridge payload window/projection.
          BACKFILL_BRIDGE_SINCE_HOURS: "24"
          BACKFILL_BRIDGE_PROJECTION_PROFILE: "policy_core"
        run: |
          chmod +x ./scripts/export_backfill_warning_audit.py
          EXTRA_ARGS=()
          if [[ "${BACKFILL_AUDIT_EXPORT_PROFILE}" == "minimal" ]]; then
            if [[ -n "${BACKFILL_AUDIT_MIN_WARNING_CODE_LIMIT}" ]]; then
              EXTRA_ARGS+=(--minimal-warning-code-limit "${BACKFILL_AUDIT_MIN_WARNING_CODE_LIMIT}")
            fi
            if [[ "${BACKFILL_AUDIT_MIN_OMIT_SIGNAL_SUMMARY}" == "true" ]]; then
              EXTRA_ARGS+=(--minimal-omit-signal-summary)
            fi
            if [[ "${BACKFILL_AUDIT_MIN_OMIT_POLICY_DRIFT_DIFFERENCES}" == "true" ]]; then
              EXTRA_ARGS+=(--minimal-omit-policy-drift-differences)
            fi
          fi
          if [[ -n "${BACKFILL_POLICY_DRIFT_PROJECTION_PROFILE}" ]]; then
            EXTRA_ARGS+=(--drift-projection-profile "${BACKFILL_POLICY_DRIFT_PROJECTION_PROFILE}")
          fi
          if [[ "${BACKFILL_ENFORCE_STABLE_POLICY_CORE}" == "true" ]]; then
            EXTRA_ARGS+=(--enforce-stable-policy-core)
          fi
          python ./scripts/export_backfill_warning_audit.py \
            alpha \
            --profile-key nightly \
            --preset quick \
            --policy-config "${GITHUB_WORKSPACE}/configs/backfill_workflow_snippets/warning-policy-quiet.json" \
            --compare-with-latest \
            --export-profile "${BACKFILL_AUDIT_EXPORT_PROFILE}" \
            --output-dir "${GITHUB_WORKSPACE}/output/backfill_warning_audit" \
            "${EXTRA_ARGS[@]}"

      - name: Build bridge payload
        if: always()
        env:
          BACKFILL_BRIDGE_SINCE_HOURS: "24"
          BACKFILL_BRIDGE_PROJECTION_PROFILE: "policy_core"
          BACKFILL_BRIDGE_ALERT_POLICY_DRIFT_COUNT_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_POLICY_DRIFT_RATE_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_GUARDRAIL_COUNT_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_GUARDRAIL_RATE_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_POLICY_DRIFT_SEVERITY: "warn"
          BACKFILL_BRIDGE_ALERT_GUARDRAIL_SEVERITY: "warn"
          BACKFILL_BRIDGE_ALERT_PROJECT_SEVERITY_OVERRIDES: ""
          BACKFILL_BRIDGE_ALERT_SUPPRESS_RULES: ""
          BACKFILL_BRIDGE_ALERT_PROJECT_SUPPRESS_SCOPES: ""
          BACKFILL_BRIDGE_ALERT_EXIT_CODE: "12"
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/output/backfill_warning_bridge"
          source "${GITHUB_WORKSPACE}/configs/backfill_workflow_snippets/helpers/bridge_args.sh"
          BRIDGE_ARGS=()
          build_backfill_bridge_alert_args BRIDGE_ARGS
          python ./scripts/build_backfill_warning_bridge.py \
            --input-dir "${GITHUB_WORKSPACE}/output/backfill_warning_audit" \
            --since-hours "${BACKFILL_BRIDGE_SINCE_HOURS}" \
            --projection-profile "${BACKFILL_BRIDGE_PROJECTION_PROFILE}" \
            --json-compact \
            "${BRIDGE_ARGS[@]}" > "${GITHUB_WORKSPACE}/output/backfill_warning_bridge/bridge_quiet.json"

      - name: Publish bridge markdown brief (optional)
        if: always()
        env:
          BACKFILL_BRIDGE_SINCE_HOURS: "24"
          BACKFILL_BRIDGE_PROJECTION_PROFILE: "policy_core"
          BACKFILL_BRIDGE_ALERT_POLICY_DRIFT_COUNT_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_POLICY_DRIFT_RATE_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_GUARDRAIL_COUNT_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_GUARDRAIL_RATE_THRESHOLD: ""
          BACKFILL_BRIDGE_ALERT_POLICY_DRIFT_SEVERITY: "warn"
          BACKFILL_BRIDGE_ALERT_GUARDRAIL_SEVERITY: "warn"
          BACKFILL_BRIDGE_ALERT_PROJECT_SEVERITY_OVERRIDES: ""
          BACKFILL_BRIDGE_ALERT_SUPPRESS_RULES: ""
          BACKFILL_BRIDGE_ALERT_PROJECT_SUPPRESS_SCOPES: ""
          BACKFILL_BRIDGE_ALERT_EXIT_CODE: "12"
          BACKFILL_BRIDGE_MARKDOWN_PUBLISH: "false"
          BACKFILL_BRIDGE_MARKDOWN_DRY_RUN: "true"
          BACKFILL_BRIDGE_MARKDOWN_DRY_RUN_OUTPUT_MODE: "full"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_ATTEMPTS: "1"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_BACKOFF_SECONDS: "0.5"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_BACKOFF_MULTIPLIER: "2.0"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_MAX_BACKOFF_SECONDS: "5.0"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_JITTER_SECONDS: "0.0"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_JITTER_SEED: ""
          BACKFILL_BRIDGE_MARKDOWN_RETRY_HTTP_STATUSES: "429,500,502,503,504"
          BACKFILL_BRIDGE_MARKDOWN_ERROR_BODY_PREVIEW_CHARS: "0"
          BACKFILL_BRIDGE_MARKDOWN_RETRY_DIAGNOSTICS_MODE: "full"
          BACKFILL_BRIDGE_MARKDOWN_ALERT_COMPACT: "false"
          BACKFILL_BRIDGE_MARKDOWN_HIDE_SUPPRESSION_SECTION: "false"
          BACKFILL_BRIDGE_MARKDOWN_INCLUDE_FAMILY_PROJECTS: "false"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_INCLUDE_COUNTS: "false"
          BACKFILL_BRIDGE_MARKDOWN_HIDE_EMPTY_FAMILY_PROJECTS: "false"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_MODE: "full"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_SOURCE: "triggered"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_SEVERITY: "all"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_MAX_ITEMS: ""
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_ORDER: "alphabetical"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_ORDER: "by_family"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_RENDER_MODE: "full_fields"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_VISIBILITY_MODE: "all_rows"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_EXPORT_MODE: "inline"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_STYLE: "full"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_EMPTY_MODE: "inline_none"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_FAMILY_LABEL_MODE: "raw"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_HEADER_LABEL_MODE: "title"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_FAMILY_LABEL_OVERRIDES: ""
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_METRIC_LABEL_MODE: "title"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_METRIC_LABEL_OVERRIDES: ""
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_ROW_ORDER_MODE: "count_order"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_INCLUDE_SCHEMA_SIGNATURE: "false"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_INLINE_FAMILY_LABEL_MODE: "raw"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_INLINE_BUCKET_LABEL_MODE: "raw"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS: "false"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_SEVERITY: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON: "false"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_MODE: "full"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_KEY_PREFIX_MODE: "bridge_"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_PROFILE: "compact_min"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_INCLUDE_MODE: "counts_only"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SORT_MODE: "input_order"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MAX_PER_SCOPE: "0"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_OVERFLOW_SUFFIX: "+{omitted} more"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_OVERFLOW_SUFFIX_MODE: "include"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_OMITTED_COUNT_VISIBILITY_MODE: "always"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_LIST_GUARD_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_LIST_KEY_MODE: "always"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SCOPE_FALLBACK_MODE: "selected_only"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_TRUNCATION_INDICATOR_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SCOPE_PRIORITY_MODE: "family_first"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_FALLBACK_EMISSION_MODE: "first_success_only"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_FALLBACK_SOURCE_MARKER_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_FALLBACK_SOURCE_MARKER_ACTIVATION_MODE: "always"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SELECTED_SCOPE_MARKER_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_KEY_NAMING_MODE: "default"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_SUPPRESSION_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_SUMMARY_VISIBILITY_MODE: "always"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_SCOPE_ORDER_MODE: "priority"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_LIST_VISIBILITY_MODE: "always"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_KEY_PREFIX_MODE: "inherit"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_BOOLEAN_TYPE_VISIBILITY_MODE: "all"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_SUMMARY_LIST_ORDER_MODE: "insertion"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_SUMMARY_FAMILY_VISIBILITY_MODE: "all"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_PER_SCOPE_FAMILY_VISIBILITY_MODE: "all"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_SUMMARY_BOOLEAN_FAMILY_VISIBILITY_MODE: "all"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_PROFILE_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_PROFILE_SIGNATURE_EXPECTED: ""
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_PROFILE_SIGNATURE_MATCH_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_PROFILE_SIGNATURE_DRIFT_EXIT_CODE: "0"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MARKER_PRECEDENCE_EXPORT_MODE: "full"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SCOPE_MODE: "both"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_DEDUP_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_NORMALIZATION_MODE: "preserve"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SANITIZATION_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_SANITIZATION_REPLACEMENT_CHAR: "_"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS_JSON_COMPACT_TOKEN_MIN_LENGTH: "1"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_CI_POLICY_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_MIN_ALL: "0"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_THRESHOLD_MODE: "off"
          BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TOP_N: ""
          BACKFILL_BRIDGE_MARKDOWN_TRIGGERED_RULE_DETAIL_MAX: ""
          BACKFILL_BRIDGE_MARKDOWN_MAX_PROJECTS: "20"
          BACKFILL_BRIDGE_MARKDOWN_WEBHOOK_URL: ""
        run: |
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_PUBLISH}" != "true" ]]; then
            echo "Bridge markdown publish disabled."
            exit 0
          fi
          mkdir -p "${GITHUB_WORKSPACE}/output/backfill_warning_bridge"
          source "${GITHUB_WORKSPACE}/configs/backfill_workflow_snippets/helpers/bridge_args.sh"
          BRIDGE_ARGS=()
          build_backfill_bridge_alert_args BRIDGE_ARGS
          MARKDOWN_ARGS=()
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_MAX_PROJECTS}" ]]; then
            MARKDOWN_ARGS+=(--markdown-max-projects "${BACKFILL_BRIDGE_MARKDOWN_MAX_PROJECTS}")
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_ALERT_COMPACT}" == "true" ]]; then
            MARKDOWN_ARGS+=(--markdown-alert-compact)
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_HIDE_SUPPRESSION_SECTION}" == "true" ]]; then
            MARKDOWN_ARGS+=(--markdown-hide-suppression-section)
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_INCLUDE_FAMILY_PROJECTS}" == "true" ]]; then
            MARKDOWN_ARGS+=(--markdown-include-family-projects)
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_INCLUDE_COUNTS}" == "true" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-include-counts)
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_HIDE_EMPTY_FAMILY_PROJECTS}" == "true" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-hide-empty-families)
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_SOURCE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-source "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_SOURCE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_SEVERITY}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-severity "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_SEVERITY}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_MAX_ITEMS}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-max-items "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_MAX_ITEMS}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_ORDER}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-order "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_ORDER}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_ORDER}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-order "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_ORDER}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_RENDER_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-render-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_RENDER_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_VISIBILITY_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-visibility-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_VISIBILITY_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_EXPORT_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-export-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_EXPORT_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_STYLE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-style "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_STYLE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_EMPTY_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-empty-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_EMPTY_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_FAMILY_LABEL_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-family-label-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_FAMILY_LABEL_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_HEADER_LABEL_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-header-label-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_HEADER_LABEL_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_FAMILY_LABEL_OVERRIDES}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-family-label-override "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_FAMILY_LABEL_OVERRIDES}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_METRIC_LABEL_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-metric-label-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_METRIC_LABEL_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_METRIC_LABEL_OVERRIDES}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-metric-label-override "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_METRIC_LABEL_OVERRIDES}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_ROW_ORDER_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-row-order-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_ROW_ORDER_MODE}")
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_TABLE_INCLUDE_SCHEMA_SIGNATURE}" == "true" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-table-include-schema-signature)
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_INLINE_FAMILY_LABEL_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-inline-family-label-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_INLINE_FAMILY_LABEL_MODE}")
          fi
          if [[ -n "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_INLINE_BUCKET_LABEL_MODE}" ]]; then
            MARKDOWN_ARGS+=(--markdown-family-projects-count-inline-bucket-label-mode "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_INLINE_BUCKET_LABEL_MODE}")
          fi
          if [[ "${BACKFILL_BRIDGE_MARKDOWN_FAMILY_PROJECTS_COUNT_LABEL_OVERRIDE_DIAGNOSTICS}" == "true" ]]; then
