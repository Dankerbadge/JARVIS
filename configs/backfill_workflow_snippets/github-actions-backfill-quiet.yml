            PUBLISH_ARGS+=(--retry-diagnostics-mode "${BACKFILL_BRIDGE_MARKDOWN_RETRY_DIAGNOSTICS_MODE}")
          fi
          python ./scripts/publish_bridge_markdown.py \
            "${PUBLISH_ARGS[@]}" > "${GITHUB_WORKSPACE}/output/backfill_warning_bridge/bridge_quiet_publish.json"

      - name: Upload warning audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backfill-warning-audit-quiet
          path: |
            output/backfill_warning_audit/*.json
            output/backfill_warning_bridge/*.json
            output/backfill_warning_bridge/*.md
          if-no-files-found: warn
